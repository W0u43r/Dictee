<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staal Spelling – Groep 4</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --blauw:        #2e7fc1;
  --blauw-donker: #1b5f96;
  --blauw-licht:  #e8f3fb;
  --blauw-mid:    #b3d4ee;
  --oranje:       #f4873a;
  --oranje-licht: #fff0e6;
  --rood:         #e04a3c;
  --rood-licht:   #fdecea;
  --groen:        #2e8a55;
  --groen-licht:  #e4f5ec;
  --geel:         #f9d94e;
  --geel-licht:   #fefae8;
  --wit:          #ffffff;
  --achter:       #eef4fb;
  --tekst:        #0f2d47;
  --tekst-zacht:  #3d6280;
  --schaduw:      rgba(30,95,150,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--achter);color:var(--tekst);font-family:'Nunito Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem;}

/* Kaart */
.kaart{background:var(--wit);border-radius:20px;box-shadow:0 6px 28px var(--schaduw);max-width:660px;width:100%;padding:1.8rem;display:flex;flex-direction:column;gap:1.3rem;position:relative;overflow:hidden;}
.kaart::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(46,127,193,0.10) 0%,transparent 70%);pointer-events:none;}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;gap:1rem;}
.titel{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.55rem;color:var(--blauw-donker);line-height:1.1;}
.titel span{display:block;font-weight:600;font-size:0.8rem;color:var(--tekst-zacht);margin-top:3px;}
.score-chip{background:var(--blauw);color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.7rem;padding:7px 14px;border-radius:50px;text-align:center;line-height:1.4;box-shadow:0 2px 10px rgba(46,127,193,0.3);white-space:nowrap;}
.score-chip strong{display:block;font-size:1.3rem;line-height:1;}

/* Schermen */
.scherm{display:none;flex-direction:column;gap:1.2rem;}
.scherm.actief{display:flex;}

/* ── Startscherm ── */
.sectie-lbl{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.74rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--tekst-zacht);}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.cat-vak{background:var(--blauw-licht);border:2px solid var(--blauw-mid);border-radius:12px;padding:10px 13px;cursor:pointer;text-align:left;transition:all 0.15s;position:relative;}
.cat-vak:hover{background:var(--blauw-mid);border-color:var(--blauw);}
.cat-vak.gekozen{background:var(--blauw);border-color:var(--blauw);color:white;}
.cat-vak.gekozen .cat-lbl{color:white;}
.cat-vak.gekozen .cat-sub{color:rgba(255,255,255,0.75);}
.cat-vak .cat-lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.88rem;color:var(--blauw-donker);display:block;}
.cat-vak .cat-sub{font-weight:400;font-size:0.68rem;color:var(--tekst-zacht);display:block;margin-top:2px;}
.cat-vak .vinkje{position:absolute;top:8px;right:10px;font-size:0.85rem;display:none;}
.cat-vak.gekozen .vinkje{display:block;}

.opties-rij{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.opt-lbl{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.74rem;color:var(--tekst-zacht);white-space:nowrap;}
.opt-knoppen{display:flex;gap:5px;}
.opt-knop{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.82rem;width:38px;height:38px;border-radius:50%;border:2px solid var(--blauw-mid);background:var(--blauw-licht);color:var(--blauw-donker);cursor:pointer;transition:all 0.15s;}
.opt-knop.actief{background:var(--blauw);border-color:var(--blauw);color:white;}

/* Foutwoordenlijst knop */
.fout-preview{background:var(--rood-licht);border:2px solid rgba(224,74,60,0.25);border-radius:12px;padding:10px 14px;display:none;flex-direction:column;gap:6px;}
.fout-preview.toon{display:flex;}
.fout-preview-hdr{display:flex;justify-content:space-between;align-items:center;}
.fout-preview-titel{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;color:var(--rood);}
.fout-chips{display:flex;flex-wrap:wrap;gap:5px;}
.fout-chip{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.75rem;background:white;border:1.5px solid rgba(224,74,60,0.3);border-radius:50px;padding:3px 10px;color:var(--rood);}

.start-knop{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;background:var(--oranje);color:white;border:none;border-radius:50px;padding:13px;cursor:pointer;box-shadow:0 3px 12px rgba(244,135,58,0.35);transition:all 0.17s;width:100%;}
.start-knop:hover{background:#d96e25;transform:translateY(-1px);}
.start-knop:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* ── Spelscherm ── */
.voortgang{display:flex;gap:4px;}
.pip{flex:1;height:6px;border-radius:3px;background:rgba(46,127,193,0.15);transition:background 0.3s;}
.pip.huidig{background:rgba(244,135,58,0.45);}
.pip.goed{background:var(--groen);}
.pip.fout{background:var(--rood);}

.vraag-teller{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.74rem;color:var(--tekst-zacht);display:flex;justify-content:space-between;align-items:center;}
.stop-knop{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.72rem;background:none;border:1.5px solid var(--blauw-mid);border-radius:50px;padding:4px 12px;color:var(--tekst-zacht);cursor:pointer;transition:all 0.15s;}
.stop-knop:hover{border-color:var(--blauw);color:var(--blauw);}

.zin-kaart{background:var(--blauw-licht);border:2px solid var(--blauw-mid);border-radius:14px;padding:14px 16px;font-size:1rem;line-height:1.65;font-style:italic;position:relative;z-index:1;}
.zin-woord-gat{display:inline-block;background:white;border-bottom:2.5px solid var(--blauw);border-radius:4px;padding:1px 20px;font-weight:800;font-style:normal;color:transparent;letter-spacing:0.05em;}

.vraag-lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.9rem;color:var(--tekst);}

/* Antwoordknoppen */
.antwoord-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.antw-knop{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;letter-spacing:0.03em;background:var(--blauw-licht);border:2.5px solid var(--blauw-mid);border-radius:13px;padding:14px 10px;cursor:pointer;transition:all 0.17s;text-align:center;color:var(--tekst);position:relative;}
.antw-knop:hover:not(:disabled){background:var(--blauw-mid);border-color:var(--blauw);transform:translateY(-1px);}
.antw-knop:disabled{cursor:default;}
.antw-knop:focus{outline:none;}
.antw-knop:focus-visible{outline:2px solid var(--blauw);outline-offset:2px;}
.antw-knop .letter{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--blauw-mid);color:var(--blauw-donker);font-size:0.72rem;line-height:22px;text-align:center;margin-right:6px;transition:all 0.15s;flex-shrink:0;}
.antw-knop.juist{background:var(--groen-licht);border-color:var(--groen);color:var(--groen);}
.antw-knop.juist .letter{background:var(--groen);color:white;}
.antw-knop.fout-keuze{background:var(--rood-licht);border-color:var(--rood);color:var(--rood);}
.antw-knop.fout-keuze .letter{background:var(--rood);color:white;}
.antw-knop.grijs{opacity:0.4;}

/* Feedback blok */
.feedback-blok{border-radius:14px;padding:14px 16px;display:none;flex-direction:column;gap:8px;}
.feedback-blok.toon{display:flex;}
.feedback-blok.goed-blok{background:var(--groen-licht);border:2px solid var(--groen);}
.feedback-blok.fout-blok{background:var(--rood-licht);border:2px solid var(--rood);}
.feedback-titel{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;}
.feedback-blok.goed-blok .feedback-titel{color:var(--groen);}
.feedback-blok.fout-blok .feedback-titel{color:var(--rood);}
.feedback-uitleg{font-size:0.85rem;line-height:1.6;color:var(--tekst);}
.feedback-uitleg strong{color:var(--blauw-donker);}
.feedback-woord{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:0.08em;text-align:center;padding:8px;border-radius:8px;background:white;}
.feedback-blok.goed-blok .feedback-woord{color:var(--groen);}
.feedback-blok.fout-blok .feedback-woord{color:var(--rood);}
.feedback-onthoud{font-size:0.78rem;color:var(--tekst-zacht);font-style:italic;}

.volgende-knop{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;background:var(--blauw);color:white;border:none;border-radius:50px;padding:12px;cursor:pointer;transition:all 0.17s;width:100%;box-shadow:0 3px 10px rgba(46,127,193,0.3);}
.volgende-knop:hover{background:var(--blauw-donker);}

/* ── Resultaten ── */
.res-ster{font-size:2.8rem;text-align:center;}
.res-score{font-family:'Nunito',sans-serif;font-weight:900;font-size:3.8rem;color:var(--blauw-donker);text-align:center;line-height:1;}
.res-score span{font-size:1.5rem;font-weight:400;color:var(--tekst-zacht);}
.res-bericht{font-size:0.95rem;color:var(--tekst-zacht);font-style:italic;text-align:center;}
.res-knoppen{display:flex;gap:10px;flex-wrap:wrap;}
.res-knop{flex:1;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.9rem;background:var(--blauw);color:white;border:none;border-radius:50px;padding:12px;cursor:pointer;transition:all 0.17s;box-shadow:0 3px 10px rgba(46,127,193,0.3);}
.res-knop:hover{background:var(--blauw-donker);}
.res-knop.wit{background:var(--wit);color:var(--blauw-donker);border:2px solid var(--blauw-mid);box-shadow:none;}
.res-knop.wit:hover{background:var(--blauw-licht);}
.res-knop.rood{background:var(--rood);box-shadow:0 3px 10px rgba(224,74,60,0.3);}
.res-knop.rood:hover{background:#c03a2d;}

/* Fout-overzicht in resultaten */
.fout-lijst-titel{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.9rem;color:var(--rood);}
.fout-lijst{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;}
.fout-item{background:var(--rood-licht);border:1.5px solid rgba(224,74,60,0.2);border-radius:10px;padding:9px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.fout-item-woord{font-family:'Nunito',sans-serif;font-weight:900;font-size:0.95rem;color:var(--rood);}
.fout-item-info{font-size:0.76rem;color:var(--tekst-zacht);line-height:1.5;}
.fout-item-gekozen{text-decoration:line-through;color:var(--rood);}

/* Fout-oefenscherm */
.fout-badge{background:var(--rood);color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.7rem;padding:3px 10px;border-radius:50px;margin-left:6px;}

/* Welkom */
.welkom{position:fixed;inset:0;z-index:999;background:var(--achter);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;padding:2rem;text-align:center;}
.welkom-titel{font-family:'Nunito',sans-serif;font-weight:900;font-size:2rem;color:var(--blauw-donker);line-height:1.1;}
.welkom-titel span{display:block;font-weight:600;font-size:1rem;color:var(--tekst-zacht);margin-top:4px;}
.welkom-knop{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;background:var(--blauw);color:white;border:none;border-radius:50px;padding:16px 40px;cursor:pointer;box-shadow:0 4px 18px rgba(46,127,193,0.4);transition:all 0.18s;}
.welkom-knop:hover{background:var(--blauw-donker);}
.welkom-sub{font-size:0.82rem;color:var(--tekst-zacht);font-style:italic;}
</style>
</head>
<body>

<!-- Welkom -->
<div class="welkom" id="welkom">
  <div class="welkom-titel">Staal Spelling<span>Groep 4 – Multiple Choice</span></div>
  <div style="font-size:3rem">📝</div>
  <button class="welkom-knop" onclick="startApp()">Tik om te beginnen</button>
  <div class="welkom-sub">Voor Florine</div>
</div>

<div class="kaart">
  <div class="hdr">
    <div class="titel">Staal Spelling<span>Groep 4</span></div>
    <div class="score-chip">Score<br><strong id="score-display">0 / 0</strong></div>
  </div>

  <!-- ① Startscherm -->
  <div class="scherm actief" id="s-start">
    <div>
      <div class="sectie-lbl" style="margin-bottom:6px">Kies categorieën (meerdere mogelijk)</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <div class="opties-rij">
      <span class="opt-lbl">📝 Vragen</span>
      <div class="opt-knoppen">
        <button class="opt-knop" onclick="kiesAantal(5)">5</button>
        <button class="opt-knop actief" onclick="kiesAantal(10)">10</button>
        <button class="opt-knop" onclick="kiesAantal(20)">20</button>
        <button class="opt-knop" onclick="kiesAantal(40)">40</button>
      </div>
    </div>

    <div class="opties-rij">
      <span class="opt-lbl">⭐ Niveau</span>
      <div class="opt-knoppen">
        <button class="opt-knop actief" id="niv-0" onclick="kiesNiveau(0)">Alles</button>
        <button class="opt-knop" id="niv-1" onclick="kiesNiveau(1)">Makkelijk</button>
        <button class="opt-knop" id="niv-2" onclick="kiesNiveau(2)">Gemiddeld</button>
        <button class="opt-knop" id="niv-3" onclick="kiesNiveau(3)">Moeilijk</button>
      </div>
    </div>

    <!-- Foutwoordenlijst preview -->
    <div class="fout-preview" id="fout-preview">
      <div class="fout-preview-hdr">
        <span class="fout-preview-titel">⚠️ Eerder fout gegaan</span>
        <button style="font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:700;background:var(--rood);color:white;border:none;border-radius:50px;padding:4px 12px;cursor:pointer;" onclick="oefenFouten()">Oefen deze</button>
      </div>
      <div class="fout-chips" id="fout-chips"></div>
      <button style="font-family:'Nunito',sans-serif;font-size:0.7rem;font-weight:600;background:none;border:none;color:var(--tekst-zacht);cursor:pointer;text-decoration:underline;text-align:left;" onclick="wissFouten()">Lijst wissen</button>
    </div>

    <button class="start-knop" id="start-knop" onclick="startSpel(false)" disabled>Selecteer een categorie</button>
  </div>

  <!-- ② Spelscherm -->
  <div class="scherm" id="s-spel">
    <div class="voortgang" id="voortgang"></div>
    <div class="vraag-teller">
      <span id="vraag-num">Vraag 1 van 10</span>
      <button class="stop-knop" onclick="stopSpel()">← Stop</button>
    </div>

    <div class="zin-kaart" id="zin-kaart"></div>
    <div class="vraag-lbl">Welk woord past hier?</div>

    <div class="antwoord-grid" id="antwoord-grid"></div>

    <div class="feedback-blok" id="feedback-blok">
      <div class="feedback-titel" id="fb-titel"></div>
      <div class="feedback-woord" id="fb-woord"></div>
      <div class="feedback-uitleg" id="fb-uitleg"></div>
      <div class="feedback-onthoud" id="fb-onthoud"></div>
    </div>

    <button class="volgende-knop" id="volgende-knop" onclick="volgende()" style="display:none">Volgende vraag &#x2192;</button>
  </div>

  <!-- ③ Resultaten -->
  <div class="scherm" id="s-res">
    <div class="res-ster" id="res-ster">⭐</div>
    <div class="res-score" id="res-score">0 <span>/ 10</span></div>
    <div class="res-bericht" id="res-bericht"></div>

    <div id="fout-sectie" style="display:none;flex-direction:column;gap:8px;">
      <div class="fout-lijst-titel">⚠️ Fout gegane woorden — onthoud deze goed!</div>
      <div class="fout-lijst" id="fout-lijst"></div>
    </div>

    <div class="res-knoppen">
      <button class="res-knop wit" onclick="naarStart()">← Opnieuw instellen</button>
      <button class="res-knop" onclick="opnieuw()">Opnieuw ↺</button>
    </div>
    <button class="res-knop rood" id="oefen-fout-knop" onclick="oefenFouten()" style="display:none">⚠️ Oefen alleen de fout gegane woorden</button>
  </div>
</div>

// ── Fouten generator ─────────────────────────────────────────────────────────
// Per categorie: doordachte fouten die een kind van 7-8 zou maken

function maakFouten(woord, catId) {
  var w = woord.toLowerCase();
  var f = [];

  // ── Categorie-specifieke fouten ──
  if (catId === 'zingwoord') {
    // ng → nk, n, nng
    f.push(
      w.replace(/ng$/, 'nk'),
      w.replace(/ng$/, 'n'),
      w.replace(/nge$/, 'ne'),
      w.replace(/ngen$/, 'nen'),
      w.replace(/ings/, 'incs'),
      w.replace(/ing$/, 'ink'),
      w.replace(/ang/, 'ank'),
      w.replace(/ong/, 'onk'),
      w.replace(/ung/, 'unk')
    );
  }
  else if (catId === 'luchtwoord') {
    // cht → gt, kt, t, cht → ch
    f.push(
      w.replace(/cht/g, 'gt'),
      w.replace(/cht/g, 'kt'),
      w.replace(/cht/g, 't'),
      w.replace(/cht/g, 'ch'),
      w.replace(/pech/, 'peg'),
      w.replace(/ach/, 'ag'),
      w.replace(/ech/, 'eg'),
      w.replace(/ich/, 'ig'),
      w.replace(/och/, 'og'),
      w.replace(/uch/, 'ug')
    );
  }
  else if (catId === 'plankwoord') {
    // nk → ng, nnk, n
    f.push(
      w.replace(/nk/g, 'ng'),
      w.replace(/nk/g, 'n'),
      w.replace(/ank/, 'ang'),
      w.replace(/ink/, 'ing'),
      w.replace(/onk/, 'ong'),
      w.replace(/unk/, 'ung'),
      w.replace(/enk/, 'eng')
    );
  }
  else if (catId === 'eiij') {
    // ei↔ij, au↔ou
    if (w.includes('ei')) f.push(w.replace(/ei/g,'ij'), w.replace(/ei/g,'ie'), w.replace(/ei/g,'ai'));
    if (w.includes('ij')) f.push(w.replace(/ij/g,'ei'), w.replace(/ij/g,'ie'), w.replace(/ij/g,'y'));
    if (w.includes('au')) f.push(w.replace(/au/g,'ou'), w.replace(/au/g,'aw'), w.replace(/au/g,'ao'));
    if (w.includes('ou')) f.push(w.replace(/ou/g,'au'), w.replace(/ou/g,'ow'), w.replace(/ou/g,'o'));
    if (w.includes('ui')) f.push(w.replace(/ui/g,'uu'), w.replace(/ui/g,'u'), w.replace(/ui/g,'uy'));
  }
  else if (catId === 'eerooreur') {
    // -eer → -er, -oor → -or, -eur → -ur, -eel → -el
    f.push(
      w.replace(/eer/g,'er'), w.replace(/oor/g,'or'), w.replace(/eur/g,'ur'), w.replace(/eel/g,'el'),
      w.replace(/eer/g,'ear'), w.replace(/oor/g,'oar'), w.replace(/eur/g,'eur').replace(/eu/,'u'),
      w.replace(/ee/g,'e').replace(/oo/g,'o')
    );
  }
  else if (catId === 'aaiooi') {
    // aai → ai, ooi → oi, oei → oi, of met y
    f.push(
      w.replace(/aai/g,'ai'), w.replace(/ooi/g,'oi'), w.replace(/oei/g,'oei').replace(/oe/,'u'),
      w.replace(/aai/g,'aay'), w.replace(/ooi/g,'ooy'), w.replace(/oei/g,'oey'),
      w.replace(/ij$/,'y'), w.replace(/ii/,'i')
    );
  }
  else if (catId === 'eeuwwoord') {
    // vergeet u: eeuw → ee, ieuw → ie, uw → w
    f.push(
      w.replace(/eeuw/g,'ee'), w.replace(/ieuw/g,'ie'), w.replace(/uw$/,'w'),
      w.replace(/eeuw/g,'eew'), w.replace(/ieuw/g,'iew'),
      w.replace(/sneeuw/,'snee'), w.replace(/leeuw/,'lee'), w.replace(/nieuw/,'nie')
    );
  }
  else if (catId === 'langermaak') {
    // d/t verwarring aan einde
    f.push(
      w.replace(/d$/, 't'), w.replace(/t$/, 'd'),
      w.replace(/nd$/, 'nt'), w.replace(/rd$/, 'rt'), w.replace(/ld$/, 'lt'),
      w.replace(/nd$/, 'n'), w.replace(/st$/, 'sd'),
      w + 'd', w + 't'
    );
  }
  else if (catId === 'voorvoegsel') {
    // be/ge stomme e: bewust fout gespeld
    f.push(
      w.replace(/^be/, 'bi'), w.replace(/^be/, 'ba'), w.replace(/^ge/, 'gi'),
      w.replace(/^ver/, 'fer'), w.replace(/^ver/, 'var'),
      w.replace(/^ge/, 'je'), w.replace(/^be/, 'bu'),
      // stomme e aan einde
      w.replace(/en$/, 'un'), w.replace(/ing$/, 'ung')
    );
  }
  else if (catId === 'verkleinwoord') {
    // je/tje/pje fouten
    f.push(
      w.replace(/tje$/, 'je'), w.replace(/tje$/, 'dje'), w.replace(/tje$/, 'sje'),
      w.replace(/pje$/, 'je'), w.replace(/pje$/, 'bje'),
      w.replace(/je$/, 'tje'), w.replace(/je$/, 'dje'),
      // dubbele medeklinker voor je
      w.replace(/(\w)je$/, '$1$1je'), w.replace(/(\w)tje$/, '$1je')
    );
  }
  else if (catId === 'achtervoegsel') {
    // -ig/-lijk fouten
    f.push(
      w.replace(/ig$/, 'ijk'), w.replace(/ig$/, 'iek'), w.replace(/ig$/, 'igg'),
      w.replace(/lijk$/, 'lik'), w.replace(/lijk$/, 'lijck'), w.replace(/lijk$/, 'leijk'),
      w.replace(/ig$/, 'ich'), w.replace(/elijk$/, 'elik')
    );
  }
  else if (catId === 'samenstelling') {
    // Splits verkeerd of spelt onderdeel fout
    var mid = Math.floor(w.length / 2);
    f.push(
      w.slice(0,mid) + ' ' + w.slice(mid), // met spatie (fout)
      w.replace(/aa/, 'a').replace(/ee/, 'e').replace(/oo/, 'o'),
      w.replace(/ij/, 'ei').replace(/ei/, 'ij')
    );
  }
  else {
    // Hakwoord en overig: klankverwisseling
    // v↔f, z↔s, w↔v aan begin
    var bverwiss = {'v':'f','f':'v','z':'s','s':'z','w':'v','g':'ch','ch':'g'};
    Object.keys(bverwiss).forEach(function(k) {
      if (w.startsWith(k)) f.push(bverwiss[k] + w.slice(k.length));
    });
    // Lange/korte klinker verwarring
    f.push(
      w.replace(/aa/,'a'), w.replace(/ee/,'e'), w.replace(/oo/,'o'), w.replace(/uu/,'u'),
      w.replace(/([aeiou])(?!\1)/, function(m) { return m+m; }) // verdubbel klinker
    );
    // Tweeklank fouten
    f.push(
      w.replace(/ui/,'uu'), w.replace(/ou/,'oe'), w.replace(/au/,'ao'),
      w.replace(/ei/,'ee'), w.replace(/ij/,'ie')
    );
    // Sch fouten
    f.push(w.replace(/sch/,'sk'), w.replace(/sch/,'sh'), w.replace(/sch/,'sg'));
  }

  // ── Universele extra fouten (altijd) ──
  // Eindletter d/t
  f.push(w.replace(/d$/, 't'), w.replace(/t$/, 'd'));
  // Dubbel/enkel
  f.push(
    w.replace(/([aeiou])\1/, '$1'),   // aa→a
    w.replace(/([aeiou])(?!\1)([aeiou]?[bcdfghjklmnpqrstvwxyz])/, '$1$1$2') // a→aa voor medeklinker
  );

  // ── Schoon filteren ──
  var goedLc = w;
  var gezien = {};
  gezien[goedLc] = true;
  f = f.filter(function(x) {
    if (!x) return false;
    var xl = x.toLowerCase().trim();
    // Niet gelijk aan juiste woord
    if (xl === goedLc) return false;
    // Niet leeg of te kort
    if (xl.length < 2) return false;
    // Niet identiek aan een al-gevonden fout
    if (gezien[xl]) return false;
    // Niet met spatie (tenzij samenstelling)
    if (catId !== 'samenstelling' && xl.includes(' ')) return false;
    // Moet enigszins op het woord lijken (niet te anders)
    if (Math.abs(xl.length - goedLc.length) > 4) return false;
    gezien[xl] = true;
    return true;
  });

  return f;
}

// ── State ────────────────────────────────────────────────────────────────────
var gekozeCats = [];
var gekozenAantal = 10;
var gekozenNiveau = 0;
var vragen = [];
var vraagIdx = 0;
var sessionScore = 0;
var sessionFouten = []; // [{word, catId, gekozen, uitleg}]
var foutWoorden = {};   // persistent: {word: {catId, uitleg, count}}
var alFouten = false;   // oefen-fouten-modus

// Laad opgeslagen fouten
try {
  var opg = localStorage.getItem('spelling_fouten');
  if (opg) foutWoorden = JSON.parse(opg);
} catch(e) {}

function slaFoutenOp() {
  try { localStorage.setItem('spelling_fouten', JSON.stringify(foutWoorden)); } catch(e) {}
}

// ── Init ─────────────────────────────────────────────────────────────────────
function startApp() {
  document.getElementById('welkom').style.display = 'none';
  bouwCatGrid();
  toonFoutPreview();
}

function bouwCatGrid() {
  var g = document.getElementById('cat-grid');
  g.innerHTML = '';
  CATS.forEach(function(c) {
    var d = document.createElement('div');
    d.className = 'cat-vak';
    d.id = 'cat-'+c.id;
    d.innerHTML = '<span class="cat-lbl">'+c.label+'</span><span class="cat-sub">'+c.sub+'</span><span class="vinkje">✓</span>';
    d.onclick = function() { toggleCat(c.id); };
    g.appendChild(d);
  });
}

function toggleCat(id) {
  var i = gekozeCats.indexOf(id);
  if (i === -1) gekozeCats.push(id);
  else gekozeCats.splice(i, 1);
  document.getElementById('cat-'+id).classList.toggle('gekozen', gekozeCats.indexOf(id) !== -1);
  updateStartKnop();
}

function updateStartKnop() {
  var knop = document.getElementById('start-knop');
  knop.disabled = gekozeCats.length === 0;
  knop.textContent = gekozeCats.length === 0
    ? 'Selecteer een categorie'
    : 'Start! (' + gekozeCats.length + ' categorie' + (gekozeCats.length > 1 ? 'en' : '') + ')';
}

function kiesAantal(n) {
  gekozenAantal = n;
  document.querySelectorAll('.opt-knoppen .opt-knop').forEach(function(b,i){
    if (b.parentElement.previousElementSibling && b.parentElement.previousElementSibling.textContent.includes('Vragen')) {
      b.classList.toggle('actief', parseInt(b.textContent) === n);
    }
  });
  // simpler: re-find by text content
  document.querySelectorAll('#s-start .opt-knoppen').forEach(function(rij, ri) {
    if (ri === 0) rij.querySelectorAll('.opt-knop').forEach(function(b) {
      b.classList.toggle('actief', parseInt(b.textContent) === n);
    });
  });
}

function kiesNiveau(n) {
  gekozenNiveau = n;
  [0,1,2,3].forEach(function(i) {
    document.getElementById('niv-'+i).classList.toggle('actief', i === n);
  });
}

function toonFoutPreview() {
  var woorden = Object.keys(foutWoorden);
  var preview = document.getElementById('fout-preview');
  var chips = document.getElementById('fout-chips');
  if (woorden.length === 0) { preview.classList.remove('toon'); return; }
  preview.classList.add('toon');
  chips.innerHTML = '';
  woorden.slice(0, 20).forEach(function(w) {
    var c = document.createElement('span');
    c.className = 'fout-chip';
    c.textContent = w + (foutWoorden[w].count > 1 ? ' ('+foutWoorden[w].count+'x)' : '');
    chips.appendChild(c);
  });
  if (woorden.length > 20) {
    var meer = document.createElement('span');
    meer.className = 'fout-chip';
    meer.textContent = '+' + (woorden.length - 20) + ' meer';
    chips.appendChild(meer);
  }
}

function wissFouten() {
  foutWoorden = {};
  slaFoutenOp();
  toonFoutPreview();
}

function oefenFouten() {
  var woorden = Object.keys(foutWoorden);
  if (woorden.length === 0) return;
  alFouten = true;
  // Bouw vragen alleen van foutwoorden
  var items = [];
  woorden.forEach(function(w) {
    var catId = foutWoorden[w].catId || 'hakwoord';
    items.push({ word: w, niveau: 2, catId: catId });
  });
  vragen = bouwVragen(items, Math.min(gekozenAantal, items.length));
  if (vragen.length === 0) return;
  naarScherm('s-spel');
  startRonde();
}

// ── Vragen bouwen ─────────────────────────────────────────────────────────────
function startSpel(fouten_modus) {
  alFouten = fouten_modus || false;
  // Verzamel items uit geselecteerde categorieën
  var alleItems = [];
  CATS.forEach(function(c) {
    if (gekozeCats.indexOf(c.id) === -1) return;
    c.items.forEach(function(item) {
      if (gekozenNiveau === 0 || item.niveau === gekozenNiveau) {
        alleItems.push({ word: item.word, niveau: item.niveau, catId: c.id });
      }
    });
  });

  if (alleItems.length === 0) return;
  mix(alleItems);
  vragen = bouwVragen(alleItems, gekozenAantal);
  if (vragen.length === 0) return;
  naarScherm('s-spel');
  startRonde();
}

function bouwVragen(items, max) {
  var result = [];
  var gebruikt = {};
  var pool = items.slice(0, max * 3); // ruim genoeg

  pool.forEach(function(item) {
    if (result.length >= max) return;
    if (gebruikt[item.word]) return;
    gebruikt[item.word] = true;

    var zin = ZINNEN[item.word] || ('Maurits oefent dit woord: ___.');
    var fouten = maakFouten(item.word, item.catId);

    // Kies 3 plausibele fouten
    var gekozenFouten = fouten.slice(0, 3);
    // Als te weinig, vul aan met willekeurige woorden uit dezelfde cat
    if (gekozenFouten.length < 3) {
      var catItems = [];
      CATS.forEach(function(c) { if (c.id === item.catId) catItems = c.items; });
      mix(catItems).forEach(function(ci) {
        if (gekozenFouten.length >= 3) return;
        if (ci.word !== item.word && !gekozenFouten.includes(ci.word)) {
          gekozenFouten.push(ci.word);
        }
      });
    }
    gekozenFouten = gekozenFouten.slice(0, 3);

    // Bouw opties en schud door elkaar
    var opties = [item.word].concat(gekozenFouten);
    mix(opties);

    // Maak uitleg over de fout
    var uitleg = maakUitleg(item.word, item.catId);

    result.push({
      woord: item.word,
      catId: item.catId,
      zin: zin,
      opties: opties,
      goed: item.word,
      uitleg: uitleg
    });
  });
  return result;
}

function maakUitleg(woord, catId) {
  var uitlegMap = {

    'plankwoord': 'Dit is een <strong>plankwoord</strong>. Je schrijft <strong>-nk</strong>, er komt nooit een g tussen de n en k.',
    'eerooreur': 'Let op de lange klinker: schrijf <strong>-eer, -oor</strong> of <strong>-eur</strong>, ook al hoor je die niet altijd.',
    'aaiooi': 'Dit woord eindigt op <strong>-aai, -ooi</strong> of <strong>-oei</strong>. Je hoort de j, maar schrijft de i.',
    'eeuwwoord': 'Denk aan de <strong>u</strong>! Bij -eeuw, -ieuw schrijf je altijd een u voor de w.',

// ── Spel ronde ───────────────────────────────────────────────────────────────
function startRonde() {
  vraagIdx = 0;
  sessionScore = 0;
  sessionFouten = [];
  updateScore();
  bouwVoortgang();
  toonVraag();
}

function bouwVoortgang() {
  var rij = document.getElementById('voortgang');
  rij.innerHTML = '';
  vragen.forEach(function(_, i) {
    var p = document.createElement('div');
    p.className = 'pip' + (i === 0 ? ' huidig' : '');
    p.id = 'pip-'+i;
    rij.appendChild(p);
  });
}

function updateScore() {
  document.getElementById('score-display').textContent = sessionScore + ' / ' + vragen.length;
}

function toonVraag() {
  var v = vragen[vraagIdx];
  document.getElementById('vraag-num').textContent = 'Vraag '+(vraagIdx+1)+' van '+vragen.length;
  document.getElementById('feedback-blok').className = 'feedback-blok';
  document.getElementById('volgende-knop').style.display = 'none';

  // Vervang het woord in de zin altijd door een leeg vak
  // Probeer case-insensitive, hele woord
  var zinOrig = v.zin || '';
  var re = new RegExp('(^|[\\s\\u00AB\\u00BB.,!?:;\'"(\\[{-])(' + escRe(v.woord) + ')([\\s\\u00AB\\u00BB.,!?:;\'"\\])}-]|$)', 'i');
  var gat = '<span class="zin-woord-gat">____</span>';
  var zinTekst;
  if (re.test(zinOrig)) {
    zinTekst = zinOrig.replace(re, '$1' + gat + '$3');
  } else {
    // Fallback: vervang gewoon de string
    var lc = zinOrig.toLowerCase();
    var wl = v.woord.toLowerCase();
    var pos = lc.indexOf(wl);
    if (pos !== -1) {
      zinTekst = zinOrig.slice(0, pos) + gat + zinOrig.slice(pos + v.woord.length);
    } else {
      // Woord niet gevonden: zet gat aan het einde
      zinTekst = zinOrig.replace(/\.$/, '') + ' ' + gat + '.';
    }
  }
  document.getElementById('zin-kaart').innerHTML = zinTekst;

  // Reset feedback en knoppen (wis vorige staat)
  document.getElementById('feedback-blok').className = 'feedback-blok';
  document.getElementById('volgende-knop').style.display = 'none';

  // Antwoordknoppen
  var grid = document.getElementById('antwoord-grid');
  grid.innerHTML = '';
  var letters = ['A','B','C','D'];
  v.opties.forEach(function(opt, i) {
    var b = document.createElement('button');
    b.className = 'antw-knop';
    b.innerHTML = '<span class="letter">'+letters[i]+'</span> '+opt;
    b.onclick = function() { checkAntwoord(opt, b); };
    b.setAttribute('tabindex', '-1');  // Geen focus-ring via Tab
    grid.appendChild(b);
  });
}

function checkAntwoord(gekozen, knop) {
  var v = vragen[vraagIdx];
  var goed = gekozen === v.goed;

  // Disable alle knoppen
  document.querySelectorAll('.antw-knop').forEach(function(b) {
    b.disabled = true;
    // Markeer juiste altijd groen
    if (b.textContent.trim().slice(1).trim() === v.goed) {
      b.classList.add('juist');
    } else if (b === knop && !goed) {
      b.classList.add('fout-keuze');
    } else {
      b.classList.add('grijs');
    }
  });

  // Pip bijwerken
  var pip = document.getElementById('pip-'+vraagIdx);
  if (pip) pip.className = 'pip ' + (goed ? 'goed' : 'fout');

  if (goed) {
    sessionScore++;
    updateScore();
    // Correct feedback - kort
    var fb = document.getElementById('feedback-blok');
    fb.className = 'feedback-blok toon goed-blok';
    document.getElementById('fb-titel').textContent = kiesPos();
    document.getElementById('fb-woord').textContent = v.goed;
    document.getElementById('fb-uitleg').innerHTML = v.uitleg;
    document.getElementById('fb-onthoud').textContent = '';

    // Verwijder uit foutwoordenlijst als het nu goed ging
    if (foutWoorden[v.goed] && foutWoorden[v.goed].count > 0) {
      foutWoorden[v.goed].count--;
      if (foutWoorden[v.goed].count <= 0) delete foutWoorden[v.goed];
      slaFoutenOp();
    }

    // Auto-doorgaan na 1.2 sec bij goede antwoord
    setTimeout(function() {
      if (document.getElementById('feedback-blok').classList.contains('toon')) volgende();
    }, 1500);

  } else {
    // Fout - langer stilstaan, sla op
    if (!foutWoorden[v.goed]) foutWoorden[v.goed] = { catId: v.catId, uitleg: v.uitleg, count: 0 };
    foutWoorden[v.goed].count++;
    slaFoutenOp();

    sessionFouten.push({ word: v.goed, catId: v.catId, gekozen: gekozen, uitleg: v.uitleg });

    var fb = document.getElementById('feedback-blok');
    fb.className = 'feedback-blok toon fout-blok';
    document.getElementById('fb-titel').textContent = 'Helaas! Het goede woord is:';
    document.getElementById('fb-woord').textContent = v.goed;
    document.getElementById('fb-uitleg').innerHTML = v.uitleg;
    document.getElementById('fb-onthoud').textContent =
      'Jij koos: "' + gekozen + '". Onthoud: "' + v.goed + '" is de juiste spelling!';

    // Wacht langer bij fouten: 3 sec of handmatig
    document.getElementById('volgende-knop').style.display = 'block';
    setTimeout(function() {
      if (document.getElementById('feedback-blok').classList.contains('toon')) volgende();
    }, 5000);
  }

  updateScore();
}

function volgende() {
  vraagIdx++;
  if (vraagIdx < vragen.length) {
    // Volgende pip markeren
    var nextPip = document.getElementById('pip-'+vraagIdx);
    if (nextPip) nextPip.className = 'pip huidig';
    toonVraag();
  } else {
    toonResultaten();
  }
}

function toonResultaten() {
  naarScherm('s-res');
  var pct = sessionScore / vragen.length;
  document.getElementById('res-score').innerHTML = sessionScore + ' <span>/ ' + vragen.length + '</span>';
  document.getElementById('res-ster').textContent = pct===1?'🏆':pct>=0.8?'⭐⭐⭐':pct>=0.6?'⭐⭐':'⭐';
  document.getElementById('res-bericht').textContent =
    pct===1  ?'Perfect! Alle woorden goed! Florine is een spellingskampioen!':
    pct>=0.8 ?'Heel goed gedaan, Florine! Bijna allemaal goed!':
    pct>=0.6 ?'Goed bezig, Florine! Blijf oefenen!':
    pct>=0.4 ?'Aardig begin! Oefen de fout gegane woorden nog eens.':
              'Probeer het nog eens, Florine! Je kan het!';

  // Foutlijst
  var foutSectie = document.getElementById('fout-sectie');
  var foutLijst = document.getElementById('fout-lijst');
  var oefen = document.getElementById('oefen-fout-knop');
  foutLijst.innerHTML = '';
  if (sessionFouten.length > 0) {
    foutSectie.style.display = 'flex';
    oefen.style.display = 'block';
    sessionFouten.forEach(function(f) {
      var div = document.createElement('div');
      div.className = 'fout-item';
      div.innerHTML =
        '<div><div class="fout-item-woord">'+f.word+'</div><div class="fout-item-info">'+
        'Jij koos: <span class="fout-item-gekozen">'+f.gekozen+'</span></div></div>'+
        '<div class="fout-item-info" style="text-align:right">'+
        (foutWoorden[f.word]?'Al '+(foutWoorden[f.word].count)+'x fout':'')+
        '</div>';
      foutLijst.appendChild(div);
    });
  } else {
    foutSectie.style.display = 'none';
    oefen.style.display = 'none';
  }
  toonFoutPreview();
}

// ── Navigatie ─────────────────────────────────────────────────────────────────
function naarScherm(id) {
  document.querySelectorAll('.scherm').forEach(function(s) { s.classList.remove('actief'); });
  document.getElementById(id).classList.add('actief');
}
function naarStart() {
  alFouten = false;
  naarScherm('s-start');
  toonFoutPreview();
}
function opnieuw() {
  if (alFouten) oefenFouten();
  else startSpel(false);
}
function stopSpel() { naarStart(); }

// ── Hulpfuncties ─────────────────────────────────────────────────────────────
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function mix(a) { for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
function kiesPos() {
  return ['Goed zo!','Correct!','Super, Florine!','Uitstekend!','Top!','Precies goed!'][Math.floor(Math.random()*6)];
}

window.addEventListener('load', function() {
  // Restore instellingen
  var an = localStorage.getItem('mc_aantal'); if (an) kiesAantal(parseInt(an));
  var nv = localStorage.getItem('mc_niveau'); if (nv !== null) kiesNiveau(parseInt(nv));
});
