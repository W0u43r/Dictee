<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staal Dictee – Groep 4</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --blauw:        #2e7fc1;
  --blauw-donker: #1b5f96;
  --blauw-licht:  #e8f3fb;
  --blauw-mid:    #b3d4ee;
  --oranje:       #f4873a;
  --geel:         #f9d94e;
  --geel-licht:   #fefae8;
  --rood:         #e04a3c;
  --rood-licht:   #fdecea;
  --groen:        #2e8a55;
  --groen-licht:  #e4f5ec;
  --wit:          #ffffff;
  --achter:       #eef4fb;
  --tekst:        #0f2d47;
  --tekst-zacht:  #3d6280;
  --schaduw:      rgba(30,95,150,0.13);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--achter);
  color: var(--tekst);
  font-family: 'Nunito Sans', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 2rem 1rem 3rem;
}
.kaart {
  background: var(--wit); border-radius: 22px;
  box-shadow: 0 6px 28px var(--schaduw), 0 1px 4px rgba(0,0,0,0.05);
  max-width: 620px; width: 100%;
  padding: 2rem 2rem 1.8rem;
  display: flex; flex-direction: column; gap: 1.4rem;
  position: relative; overflow: hidden;
}
.kaart::before { content:''; position:absolute; top:-45px; right:-45px; width:170px; height:170px; border-radius:50%; background:radial-gradient(circle,rgba(46,127,193,0.12) 0%,transparent 70%); pointer-events:none; }
.kaart::after  { content:''; position:absolute; bottom:-28px; left:-28px; width:130px; height:130px; border-radius:50%; background:radial-gradient(circle,rgba(249,217,78,0.14) 0%,transparent 70%); pointer-events:none; }

.kaart-header { display:flex; justify-content:space-between; align-items:center; gap:1rem; position:relative; z-index:1; }
.kaart-titel { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.65rem; color:var(--blauw-donker); line-height:1.1; }
.kaart-titel span { display:block; font-weight:600; font-size:0.82rem; color:var(--tekst-zacht); margin-top:3px; font-family:'Nunito Sans',sans-serif; }
.score-chip { background:var(--blauw); color:white; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.72rem; padding:8px 16px; border-radius:50px; text-align:center; line-height:1.4; box-shadow:0 2px 10px rgba(46,127,193,0.35); white-space:nowrap; }
.score-chip strong { display:block; font-size:1.4rem; line-height:1; }

.stem-melding { font-size:0.78rem; color:var(--blauw-donker); background:var(--blauw-licht); border:1.5px solid var(--blauw-mid); padding:10px 14px; border-radius:10px; line-height:1.5; display:none; }
.stem-melding.toon { display:block; }

.stem-rij { display:none; align-items:center; gap:8px; flex-wrap:wrap; position:relative; z-index:1; }
.stem-rij.toon { display:flex; }
.lbl-klein { font-family:'Nunito',sans-serif; font-weight:700; font-size:0.76rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--tekst-zacht); white-space:nowrap; }



.sectie-lbl { font-family:'Nunito',sans-serif; font-weight:700; font-size:0.76rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--tekst-zacht); margin-bottom:4px; }
.cat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.cat-btn { background:var(--blauw-licht); border:2px solid var(--blauw-mid); border-radius:14px; padding:12px 14px; cursor:pointer; text-align:left; transition:all 0.17s; font-family:'Nunito',sans-serif; }
.cat-btn:hover { background:var(--blauw-mid); border-color:var(--blauw); transform:translateY(-2px); box-shadow:0 5px 14px var(--schaduw); }
.cat-btn .lbl { font-weight:800; font-size:0.9rem; color:var(--blauw-donker); display:block; }
.cat-btn .sub { font-weight:400; font-size:0.7rem; color:var(--tekst-zacht); display:block; margin-top:2px; }

.progress-row { display:flex; gap:5px; }
.pip { flex:1; height:6px; border-radius:3px; background:rgba(46,127,193,0.15); transition:background 0.3s; }
.pip.huidig { background:rgba(244,135,58,0.5); }
.pip.goed   { background:var(--groen); }
.pip.fout   { background:var(--rood); }

.luister-kaart { background:var(--blauw-licht); border:2px solid var(--blauw-mid); border-radius:16px; padding:1.6rem 1rem; display:flex; flex-direction:column; align-items:center; gap:12px; position:relative; z-index:1; }
.woord-num { font-family:'Nunito',sans-serif; font-weight:700; font-size:0.76rem; color:var(--tekst-zacht); letter-spacing:0.04em; }
.luister-knop { background:var(--blauw); border:none; border-radius:50%; width:80px; height:80px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; box-shadow:0 4px 18px rgba(46,127,193,0.40); transition:all 0.17s; }
.luister-knop:hover { background:var(--blauw-donker); transform:scale(1.06); }
.luister-knop.bezig { background:var(--oranje); box-shadow:0 4px 18px rgba(244,135,58,0.45); animation:klop 0.7s ease-in-out infinite alternate; }
@keyframes klop { from{transform:scale(1)} to{transform:scale(1.09)} }
.luister-knop svg { width:32px; height:32px; }

.golven { display:flex; gap:5px; align-items:center; height:24px; opacity:0; transition:opacity 0.2s; }
.golven.actief { opacity:1; }
.golf { width:5px; border-radius:3px; background:var(--blauw); animation:golf 1s ease-in-out infinite; }
.golf:nth-child(1){animation-delay:0s;height:8px} .golf:nth-child(2){animation-delay:.15s;height:16px}
.golf:nth-child(3){animation-delay:.30s;height:22px} .golf:nth-child(4){animation-delay:.45s;height:16px}
.golf:nth-child(5){animation-delay:.60s;height:8px}
@keyframes golf { 0%,100%{transform:scaleY(0.5);opacity:0.5} 50%{transform:scaleY(1);opacity:1} }

.knop-label { font-family:'Nunito',sans-serif; font-weight:700; font-size:0.76rem; color:var(--tekst-zacht); }
.knop-rij-klein { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.klein-knop { background:white; border:2px solid var(--blauw-mid); border-radius:50px; padding:7px 16px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.78rem; color:var(--blauw-donker); cursor:pointer; transition:all 0.15s; }
.klein-knop:hover { background:var(--blauw-mid); border-color:var(--blauw); }

.invoer-rij { display:flex; gap:10px; align-items:center; position:relative; z-index:1; }
#spell-input { flex:1; font-family:'Nunito',sans-serif; font-weight:700; font-size:1.45rem; letter-spacing:0.05em; background:var(--blauw-licht); border:2.5px solid var(--blauw-mid); border-radius:12px; padding:10px 16px; color:var(--tekst); outline:none; text-transform:lowercase; transition:border-color 0.2s, background 0.2s; }
#spell-input::placeholder { color:rgba(61,98,128,0.4); font-weight:400; }
#spell-input:focus { border-color:var(--blauw); background:var(--wit); }
#spell-input.goed-input { border-color:var(--groen); background:var(--groen-licht); }
#spell-input.fout-input { border-color:var(--rood); background:var(--rood-licht); }
.controleer-knop { font-family:'Nunito',sans-serif; font-weight:800; font-size:1rem; background:var(--oranje); color:white; border:none; border-radius:12px; padding:12px 22px; cursor:pointer; white-space:nowrap; box-shadow:0 3px 10px rgba(244,135,58,0.35); transition:all 0.17s; }
.controleer-knop:hover { background:#d96e25; transform:translateY(-1px); }

.feedback { min-height:72px; position:relative; z-index:1; display:flex; flex-direction:column; gap:6px; }
.fb-hoofd { font-family:'Nunito',sans-serif; font-weight:800; font-size:1.05rem; opacity:0; transform:translateY(6px); transition:all 0.22s; }
.fb-hoofd.toon { opacity:1; transform:none; }
.fb-hoofd.goed { color:var(--groen); } .fb-hoofd.fout { color:var(--rood); }
.fb-woord { font-size:0.88rem; letter-spacing:0.04em; opacity:0; transition:opacity 0.3s 0.14s; color:var(--tekst-zacht); }
.fb-woord.toon { opacity:1; }
.char-diff { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; opacity:0; transition:opacity 0.3s 0.2s; }
.char-diff.toon { opacity:1; }
.char-box { font-family:'Nunito',sans-serif; font-weight:700; font-size:1.05rem; width:30px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:7px; border:2px solid transparent; }
.char-box.ok    { background:var(--groen-licht); border-color:var(--groen); color:var(--groen); }
.char-box.fout  { background:var(--rood-licht);  border-color:var(--rood);  color:var(--rood); }
.char-box.extra { background:var(--geel-licht);  border-color:var(--geel);  color:#7a6200; }

.resultaten { display:none; flex-direction:column; align-items:center; gap:1.4rem; text-align:center; position:relative; z-index:1; }
.resultaten.toon { display:flex; }
.score-ster { font-size:2.8rem; animation:sterren 0.5s ease forwards; }
@keyframes sterren { 0%{transform:scale(0) rotate(-20deg);opacity:0} 65%{transform:scale(1.2) rotate(5deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
.grote-score { font-family:'Nunito',sans-serif; font-weight:900; font-size:4rem; color:var(--blauw-donker); line-height:1; }
.grote-score span { font-size:1.5rem; font-weight:400; color:var(--tekst-zacht); }
.res-bericht { font-size:0.98rem; color:var(--tekst-zacht); font-style:italic; max-width:320px; }
.woord-lijst { width:100%; display:flex; flex-direction:column; gap:5px; max-height:220px; overflow-y:auto; }
.woord-rij { display:flex; align-items:center; justify-content:space-between; font-size:0.85rem; padding:7px 10px; border-radius:9px; background:var(--achter); }
.woord-rij .links { display:flex; gap:8px; align-items:center; font-family:'Nunito',sans-serif; font-weight:700; }
.woord-rij .antwoord { color:var(--tekst-zacht); text-decoration:line-through; font-size:0.8rem; }
.woord-rij .antwoord.ok { text-decoration:none; color:var(--groen); }
.herstart-knop { font-family:'Nunito',sans-serif; font-weight:800; font-size:0.95rem; background:var(--blauw); color:white; border:none; border-radius:50px; padding:12px 28px; cursor:pointer; transition:all 0.17s; box-shadow:0 3px 10px rgba(46,127,193,0.3); }
.herstart-knop:hover { background:var(--blauw-donker); transform:translateY(-1px); }
.herstart-knop.wit { background:var(--wit); color:var(--blauw-donker); border:2px solid var(--blauw-mid); box-shadow:none; }
.herstart-knop.wit:hover { background:var(--blauw-licht); }

#spel-area { display:none; flex-direction:column; gap:1.2rem; }




/* ── Niveau knoppen ── */
.niveau-rij {
  display: flex; align-items: center; gap: 10px;
  position: relative; z-index: 1;
}
.niveau-rij label {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.76rem;
  color: var(--tekst-zacht); white-space: nowrap;
}
.niveau-knoppen { display: flex; gap: 6px; }
.niveau-knop {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.8rem;
  padding: 7px 16px; border-radius: 50px;
  border: 2px solid var(--blauw-mid); background: var(--blauw-licht);
  color: var(--blauw-donker); cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.niveau-knop:hover { background: var(--blauw-mid); border-color: var(--blauw); }
.niveau-knop.actief { background: var(--blauw); border-color: var(--blauw); color: white; box-shadow: 0 2px 8px rgba(46,127,193,0.35); }

/* ── Aantal woorden ── */
.aantal-rij {
  display: flex; align-items: center; gap: 10px;
  position: relative; z-index: 1;
}
.aantal-rij label {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.76rem;
  color: var(--tekst-zacht); white-space: nowrap;
}
.aantal-knoppen { display: flex; gap: 6px; flex-wrap: wrap; }
.aantal-knop {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.88rem;
  width: 42px; height: 42px; border-radius: 50%;
  border: 2px solid var(--blauw-mid); background: var(--blauw-licht);
  color: var(--blauw-donker); cursor: pointer; transition: all 0.15s;
}
.aantal-knop:hover { background: var(--blauw-mid); border-color: var(--blauw); }
.aantal-knop.actief { background: var(--blauw); border-color: var(--blauw); color: white; box-shadow: 0 2px 8px rgba(46,127,193,0.35); }

/* ── Snelheid schuifje ── */
.snelheid-rij {
  display: flex; align-items: center; gap: 10px;
  position: relative; z-index: 1;
}
.snelheid-rij label {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.76rem;
  color: var(--tekst-zacht); white-space: nowrap;
}
.snelheid-slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 5px; border-radius: 3px;
  background: linear-gradient(to right, var(--blauw) 0%, var(--blauw) 50%, var(--blauw-mid) 50%, var(--blauw-mid) 100%);
  outline: none; cursor: pointer;
}
.snelheid-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--blauw); box-shadow: 0 2px 6px rgba(46,127,193,0.4);
  cursor: pointer;
}
.snelheid-waarde {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.82rem;
  color: var(--blauw); min-width: 30px; text-align: right;
}

/* ── Stem tip banner ── */
.stem-tip {
  background: var(--blauw-licht); border: 2px solid var(--blauw-mid);
  border-radius: 14px; padding: 12px 14px;
  font-size: 0.82rem; line-height: 1.6; color: var(--tekst-zacht);
  position: relative; z-index: 1;
}
.stem-tip strong { color: var(--tekst); }
.stem-tip details { margin-top: 6px; }
.stem-tip summary {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.78rem;
  color: var(--blauw); cursor: pointer; list-style: none;
}
.stem-tip summary::-webkit-details-marker { display: none; }
.stem-tip summary::before { content: '▶ '; font-size: 0.65rem; }
details[open] summary::before { content: '▼ '; }
.stem-tip ol { margin: 8px 0 0 16px; display: flex; flex-direction: column; gap: 4px; }

/* ── Stem rij ── */
.stem-rij {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  position: relative; z-index: 1;
}





</style>
</head>
<body>
<div class="kaart">

  <div class="kaart-header">
    <div class="kaart-titel">Staal Dictee<span>Groep 4 – Spelling oefenen</span></div>
    <div class="score-chip">Score<br><strong id="score-display">0 / 0</strong></div>
  </div>

  <!-- Niveau -->
  <div class="niveau-rij">
    <label>⭐ Niveau</label>
    <div class="niveau-knoppen">
      <button class="niveau-knop actief" id="niveau-0" onclick="kiesNiveau(0)">Alles</button>
      <button class="niveau-knop" id="niveau-1" onclick="kiesNiveau(1)">Makkelijk</button>
      <button class="niveau-knop" id="niveau-2" onclick="kiesNiveau(2)">Gemiddeld</button>
      <button class="niveau-knop" id="niveau-3" onclick="kiesNiveau(3)">Moeilijk</button>
    </div>
  </div>

  <!-- Aantal woorden -->
  <div class="aantal-rij">
    <label>📝 Woorden</label>
    <div class="aantal-knoppen">
      <button class="aantal-knop" onclick="kiesAantal(5)">5</button>
      <button class="aantal-knop actief" id="aantal-10" onclick="kiesAantal(10)">10</button>
      <button class="aantal-knop" onclick="kiesAantal(15)">15</button>
      <button class="aantal-knop" onclick="kiesAantal(20)">20</button>
    </div>
  </div>

  <!-- Snelheid schuifje -->
  <div class="snelheid-rij">
    <label for="snelheid-slider">🐢 Snelheid</label>
    <input type="range" id="snelheid-slider" class="snelheid-slider"
      min="0.4" max="1.1" step="0.05" value="0.8"
      oninput="updateSnelheid(this.value)">
    <span class="snelheid-waarde" id="snelheid-waarde">0.8×</span>
  </div>

  <!-- Categorie keuze -->
  <div id="cat-sectie">
    <div class="sectie-label">Kies een woordsoort</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- Voortgang -->
  <div class="progress-row" id="progress-row" style="display:none"></div>

  <!-- Spel -->
  <div id="spel-area" style="display:none; flex-direction:column; gap:1.2rem;">
    <div class="luister-kaart">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
        <div class="woord-num" id="woord-num">Woord 1 van 10</div>
        <button onclick="stopEnTerug()" style="font-family:'Nunito',sans-serif;font-weight:700;font-size:0.72rem;background:none;border:1.5px solid var(--blauw-mid);border-radius:50px;padding:4px 12px;color:var(--tekst-zacht);cursor:pointer;">← Stop</button>
      </div>

      <button class="luister-knop" id="luister-knop"
        onclick="speakFull(); focusInput();" title="Hoor zin + woord">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M3 9v6h4l5 5V4L7 9H3z" fill="white"/>
          <path d="M16.5 12A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="white"/>
          <path d="M19 12c0 3.53-2.53 6.44-5.87 7v-2.02A5 5 0 0019 12a5 5 0 00-5.87-4.98V5c3.34.56 5.87 3.47 5.87 7z" fill="white"/>
        </svg>
      </button>

      <div class="golven" id="golven">
        <div class="golf"></div><div class="golf"></div><div class="golf"></div>
        <div class="golf"></div><div class="golf"></div>
      </div>

      <div class="knop-label" id="knop-label">🔊 Druk om de zin te horen</div>

      <div class="knop-rij-klein">
        <button class="klein-knop" onclick="speakWoordAlleen(); focusInput();">🔁 Herhaal woord</button>
        <button class="klein-knop" onclick="speakFull(true); focusInput();">🐢 Langzaam</button>
      </div>
    </div>

    <div class="invoer-rij">
      <input type="text" id="spell-input" placeholder="typ het woord…"
        autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" inputmode="text" onkeydown="handleKey(event)">
      <button class="controleer-knop" id="controleer-knop" onclick="checkAntwoord()">Controleer →</button>
    </div>

    <div class="feedback">
      <div class="fb-hoofd" id="fb-hoofd"></div>
      <div class="fb-woord"  id="fb-woord"></div>
      <div class="char-diff" id="char-diff"></div>
    </div>
  </div>

  <!-- Resultaten -->
  <div class="resultaten" id="resultaten">
    <div class="score-ster" id="score-ster">⭐</div>
    <div class="grote-score" id="grote-score">0 <span>/ 10</span></div>
    <div class="res-bericht" id="res-bericht"></div>
    <div class="woord-lijst" id="woord-lijst"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="herstart-knop wit" onclick="naarCats()">← Andere categorie</button>
      <button class="herstart-knop" onclick="herstart()">Opnieuw ↺</button>
    </div>
  </div>

</div>

<script>

var CATS = [
  {
    id:'hakwoord', label:'Hakwoorden', sub:'Cat. 1a/1b – MKM, tweeklanken',
    items:[
      {word:'as',    niveau:1, sentence:'Maurits veegt de as uit de haard.'},
      {word:'bak',   niveau:1, sentence:'Maurits zet de bak op tafel.'},
      {word:'dak',   niveau:1, sentence:'Maurits ziet de vogel op het dak.'},
      {word:'dom',   niveau:1, sentence:'Maurits maakt een domme fout.'},
      {word:'hoog',  niveau:1, sentence:'Maurits springt zo hoog als hij kan.'},
      {word:'hut',   niveau:1, sentence:'Maurits bouwt een hut in het bos.'},
      {word:'jas',   niveau:1, sentence:'Maurits hangt zijn jas aan de kapstok.'},
      {word:'rook',  niveau:1, sentence:'Maurits ziet rook uit de schoorsteen.'},
      {word:'val',   niveau:1, sentence:'Maurits maakt een val voor de muis.'},
      {word:'zaak',  niveau:1, sentence:'Maurits wil later een eigen zaak beginnen.'},
      {word:'boom',  niveau:1, sentence:'Maurits klimt in de grote boom.'},
      {word:'den',   niveau:1, sentence:'Maurits ziet een hoge den in het bos.'},
      {word:'dit',   niveau:1, sentence:'Maurits zegt: dit is mijn boek.'},
      {word:'muur',  niveau:1, sentence:'Maurits tekent een ster op de muur.'},
      {word:'toon',  niveau:1, sentence:'Maurits speelt de goede toon op zijn blokfluit.'},

// ── State ─────────────────────────────────────────────────────────────────────
var huidigeCat=null, items=[], idx=0, score=0, sessieRes=[], beantwoord=false;
var gekozenAantal = 10;
var gekozenNiveau = 0;  // 0 = alles
var spraakSnelheid = 0.80;  // instelbaar via schuifje
var gekozenStem = null;

// ── Stemmen laden ─────────────────────────────────────────────────────────────
// Rangschik: Neural (beste) > Wavenet/Enhanced > standaard
// Markeer Vlaams zodat gebruiker het kan herkennen
function stemScore(v) {
  var n = v.name.toLowerCase();
  var lang = v.lang.toLowerCase();
  if (lang === 'nl-be') return 0;                      // Vlaams: laagste prio
  if (/neural|fenna|colette/.test(n)) return 100;      // Neural (Windows/Edge): hoogste
  if (/fleur/.test(n))   return 90;                    // Fleur  (iPhone/iPad)
  if (/ellen/.test(n))   return 85;                    // Ellen  (iPhone/iPad): goed
  if (/xander/.test(n))  return 70;                    // Xander (iPhone/iPad)
  if (/enhanced|premium|wavenet/.test(n)) return 60;
  if (lang === 'nl-nl') return 40;
  if (lang.startsWith('nl')) return 20;
  return 10;
}

function laadStemmen() {
  var raw = speechSynthesis.getVoices();
  var nl = raw.filter(function(v) { return v.lang.startsWith('nl'); });
  if (nl.length === 0) { setTimeout(laadStemmen, 500); return; }
  nl.sort(function(a, b) { return stemScore(b) - stemScore(a); });
  gekozenStem = nl[0];
  console.log('Stem:', gekozenStem ? gekozenStem.name + ' (' + gekozenStem.lang + ')' : 'geen');
}

function updateSnelheid(val) {
  spraakSnelheid = parseFloat(val);
  document.getElementById('snelheid-waarde').textContent = spraakSnelheid.toFixed(2) + '×';
  // Update slider gradient
  var pct = ((spraakSnelheid - 0.4) / (1.1 - 0.4)) * 100;
  document.getElementById('snelheid-slider').style.background =
    'linear-gradient(to right, var(--blauw) 0%, var(--blauw) ' + pct + '%, var(--blauw-mid) ' + pct + '%, var(--blauw-mid) 100%)';
  localStorage.setItem('spraak_snelheid', spraakSnelheid);
}

function testStem() {
  spreek('Hallo Florine, dit is jouw dictee stem!', 1.0, null);
}

speechSynthesis.addEventListener('voiceschanged', laadStemmen);
window.addEventListener('load', function() {
  speechSynthesis.getVoices(); // trigger
  laadStemmen();
  bouwGrid();
  // Herstel opgeslagen snelheid
  var savedNiveau = localStorage.getItem('niveau');
  if (savedNiveau !== null) { kiesNiveau(parseInt(savedNiveau)); }

  var savedAantal = localStorage.getItem('aantal_woorden');
  if (savedAantal) { kiesAantal(parseInt(savedAantal)); }

  var savedSpeed = localStorage.getItem('spraak_snelheid');
  if (savedSpeed) {
    spraakSnelheid = parseFloat(savedSpeed);
    var sl = document.getElementById('snelheid-slider');
    sl.value = spraakSnelheid;
    updateSnelheid(spraakSnelheid);
  }
});

// ── TTS spreekfunctie ─────────────────────────────────────────────────────────
function spreek(tekst, rate, cb) {
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(tekst);
  u.lang  = 'nl-NL';
  u.rate  = rate || spraakSnelheid;
  u.pitch = 0.85;   // iets lager = minder robotachtig
  u.volume = 1.0;
  if (gekozenStem) u.voice = gekozenStem;
  u.onend   = function() { setBezigKnop(false); if (cb) cb(); };
  u.onerror = function() { setBezigKnop(false); if (cb) cb(); };
  setBezigKnop(true);
  speechSynthesis.speak(u);
}

function speakFull(langzaam) {
  if (!items[idx]) return;
  var zin   = items[idx].sentence;
  var woord = items[idx].word;
  var rate  = langzaam ? spraakSnelheid * 0.75 : spraakSnelheid;
  speechSynthesis.cancel();
  setBezigKnop(true);
  // Zin → woord → woord: drie losse utterances voor betere pauzes
  var u1 = maakUtterance(zin,   rate);
  var u2 = maakUtterance(woord, rate * 0.82);  // woord iets langzamer dan zin
  var u3 = maakUtterance(woord, rate * 0.78);  // tweede herhaling nog iets langzamer
  u1.onend = function() { setTimeout(function() { speechSynthesis.speak(u2); }, 800); };  // langere pauze
  u2.onend = function() { setTimeout(function() { speechSynthesis.speak(u3); }, 650); };
  u3.onend = function() { setBezigKnop(false); };
  u1.onerror = u2.onerror = u3.onerror = function() { setBezigKnop(false); };
  speechSynthesis.speak(u1);
}

function speakWoordAlleen() {
  if (!items[idx]) return;
  speechSynthesis.cancel();
  setBezigKnop(true);
  var u = maakUtterance(items[idx].word, 0.72);
  u.onend  = function() { setBezigKnop(false); };
  u.onerror= function() { setBezigKnop(false); };
  speechSynthesis.speak(u);
}

function maakUtterance(tekst, rate) {
  var u = new SpeechSynthesisUtterance(tekst);
  u.lang   = 'nl-NL';
  u.rate   = rate || spraakSnelheid;
  u.pitch  = 0.85;   // iets lager = minder robotachtig
  u.volume = 1.0;
  if (gekozenStem) u.voice = gekozenStem;
  return u;
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setBezigKnop(aan) {
  document.getElementById('luister-knop').classList.toggle('bezig', aan);
  document.getElementById('golven').classList.toggle('actief', aan);
  setKnopLabel(aan ? '🔊 Bezig…' : '🔊 Druk om de zin te horen');
}
function setKnopLabel(t) { document.getElementById('knop-label').textContent = t; }
function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
function focusInput() {
  var inp = document.getElementById('spell-input');
  inp.removeAttribute('readonly'); inp.focus();
  setTimeout(function() { inp.scrollIntoView({ behavior:'smooth', block:'center' }); }, 300);
}

// ── Categorieën ───────────────────────────────────────────────────────────────
function bouwGrid() {
  var g = document.getElementById('cat-grid');
  g.innerHTML = '';
  CATS.forEach(function(c) {
    var b = document.createElement('button');
    b.className = 'cat-btn';
    b.innerHTML = '<span class="lbl">'+c.label+'</span><span class="sub">'+c.sub+'</span>';
    b.onclick = function() { start(c); };
    g.appendChild(b);
  });
}

function start(c) {
  huidigeCat=c;
  var gefilterd = gekozenNiveau === 0
    ? [].concat(c.items)
    : c.items.filter(function(w) { return w.niveau === gekozenNiveau; });
  if (gefilterd.length === 0) gefilterd = [].concat(c.items); // fallback
  items = mix(gefilterd).slice(0, gekozenAantal);
  idx=0; score=0; sessieRes=[]; beantwoord=false;
  document.getElementById('cat-sectie').style.display='none';
  document.getElementById('resultaten').classList.remove('toon');
  document.getElementById('progress-row').style.display='flex';
  document.getElementById('spel-area').style.display='flex';
  bouwVoortgang(); updateScore(); toonItem();
}

function bouwVoortgang() {
  var r=document.getElementById('progress-row'); r.innerHTML='';
  items.forEach(function(_,i) {
    var p=document.createElement('div');
    p.className='pip'+(i===0?' huidig':''); p.id='pip-'+i; r.appendChild(p);
  });
}
function updatePip(i,cls) {
  var p=document.getElementById('pip-'+i); if(p) p.className='pip '+cls;
  var n=document.getElementById('pip-'+(i+1)); if(n) n.classList.add('huidig');
}
function updateScore() {
  document.getElementById('score-display').textContent=score+' / '+items.length;
}
function toonItem() {
  beantwoord=false;
  document.getElementById('woord-num').textContent='Woord '+(idx+1)+' van '+items.length;
  var inp=document.getElementById('spell-input');
  inp.value=''; inp.className='';
  document.getElementById('controleer-knop').textContent='Controleer →';
  verbergFB(); setKnopLabel('🔊 Druk om de zin te horen');
  if (!isIOS()) setTimeout(function(){ inp.focus(); }, 300);
  setTimeout(speakFull, 400);
}
function handleKey(e) { if(e.key==='Enter') checkAntwoord(); }
function checkAntwoord() {
  if(beantwoord) { volgende(); return; }
  var inp=document.getElementById('spell-input');
  var getypt=inp.value.trim().toLowerCase();
  if(!getypt) { speakFull(); return; }
  var correct=items[idx].word.toLowerCase();
  var ok=(getypt===correct);
  beantwoord=true;
  inp.classList.add(ok?'goed-input':'fout-input');
  var fbH=document.getElementById('fb-hoofd');
  var fbW=document.getElementById('fb-woord');
  var chD=document.getElementById('char-diff');
  if(ok) {
    score++;
    fbH.textContent=kiesPos(); fbH.className='fb-hoofd toon goed';
    fbW.textContent='✓ '+items[idx].word; fbW.className='fb-woord toon';
    chD.className='char-diff'; updatePip(idx,'goed');
  } else {
    fbH.textContent='Helaas, dat klopt niet!'; fbH.className='fb-hoofd toon fout';
    fbW.textContent='Het juiste woord: '+items[idx].word; fbW.className='fb-woord toon';
    toonDiff(getypt,correct); chD.className='char-diff toon';
    updatePip(idx,'fout');
    setTimeout(function(){ spreek(correct, 0.72, null); }, 400);
  }
  sessieRes.push({word:items[idx].word, answer:getypt, correct:ok});
  updateScore();
  document.getElementById('controleer-knop').textContent='Volgende →';
  setTimeout(volgende, 2200);
}
function toonDiff(getypt,correct) {
  var box=document.getElementById('char-diff'); box.innerHTML='';
  var max=Math.max(getypt.length,correct.length);
  for(var i=0;i<max;i++) {
    var tc=getypt[i]||'', cc=correct[i]||'';
    var el=document.createElement('div'); el.className='char-box';
    if(!cc){el.classList.add('extra');el.textContent=tc;}
    else if(tc===cc){el.classList.add('ok');el.textContent=cc;}
    else{el.classList.add('fout');el.textContent=cc;el.title='Jij: "'+(tc||'–')+'"';}
    box.appendChild(el);
  }
}
function verbergFB() {
  document.getElementById('fb-hoofd').className='fb-hoofd';
  document.getElementById('fb-woord').className='fb-woord';
  document.getElementById('char-diff').className='char-diff';
}
function volgende() { idx++; if(idx<items.length) toonItem(); else toonResultaten(); }
function toonResultaten() {
  document.getElementById('spel-area').style.display='none';
  document.getElementById('progress-row').style.display='none';
  document.getElementById('resultaten').classList.add('toon');
  var pct=score/items.length;
  document.getElementById('grote-score').innerHTML=score+' <span>/ '+items.length+'</span>';
  document.getElementById('score-ster').textContent=pct===1?'🏆':pct>=0.8?'⭐⭐⭐':pct>=0.6?'⭐⭐':'⭐';
  document.getElementById('res-bericht').textContent=
    pct===1  ?'Perfect! Alle woorden goed! Florine is een spellingsheld! 🎉':
    pct>=0.8 ?'Super goed gedaan, Florine! Bijna allemaal goed!':
    pct>=0.6 ?'Goed bezig, Florine! Nog een keer oefenen.':
    pct>=0.4 ?'Aardig begin! Blijf oefenen, Florine!':
              'Probeer het nog eens – jij kan het zeker! 💪';
  var lijst=document.getElementById('woord-lijst'); lijst.innerHTML='';
  sessieRes.forEach(function(r) {
    var rij=document.createElement('div'); rij.className='woord-rij';
    rij.innerHTML='<div class="links"><span>'+(r.correct?'✅':'❌')+'</span><span>'+r.word+'</span></div>'
      +'<span class="antwoord '+(r.correct?'ok':'')+'">'+ r.answer+'</span>';
    lijst.appendChild(rij);
  });
}
function kiesNiveau(n) {
  gekozenNiveau = n;
  localStorage.setItem('niveau', n);
  document.querySelectorAll('.niveau-knop').forEach(function(b) {
    b.classList.remove('actief');
  });
  document.getElementById('niveau-' + n).classList.add('actief');
}

function kiesAantal(n) {
  gekozenAantal = n;
  localStorage.setItem('aantal_woorden', n);
  // Update actieve knop
  document.querySelectorAll('.aantal-knop').forEach(function(b) {
    b.classList.toggle('actief', parseInt(b.textContent) === n);
  });
}

function stopEnTerug() {
  speechSynthesis.cancel();
  beantwoord = false;
  document.getElementById('spel-area').style.display = 'none';
  document.getElementById('progress-row').style.display = 'none';
  document.getElementById('resultaten').classList.remove('toon');
  document.getElementById('cat-sectie').style.display = '';
  document.getElementById('score-display').textContent = '0 / 0';
}

function naarCats() {
  speechSynthesis.cancel();
  document.getElementById('resultaten').classList.remove('toon');
  document.getElementById('cat-sectie').style.display='';
  document.getElementById('score-display').textContent='0 / 0';
}
function herstart() { speechSynthesis.cancel(); start(huidigeCat); }
function mix(a) {
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function toonDebug() {
  var alle = speechSynthesis.getVoices();
  var box = document.getElementById('stem-debug');
  if (alle.length === 0) {
    box.innerHTML = '⚠️ Geen stemmen gevonden. Probeer de pagina te herladen.';
  } else {
    var nl = alle.filter(function(v){ return v.lang.startsWith('nl'); });
    var rest = alle.filter(function(v){ return !v.lang.startsWith('nl'); });
    var txt = '<strong>Nederlandse stemmen (' + nl.length + '):</strong><br>';
    nl.forEach(function(v){ txt += '• ' + v.name + ' (' + v.lang + ')<br>'; });
    txt += '<br><strong>Alle stemmen totaal: ' + alle.length + '</strong>';
    box.innerHTML = txt;
  }
  box.style.display = 'block';
}

function kiesPos() {
  return ['Goed gedaan! 🎉','Helemaal goed!','Super Florine!','Uitstekend!','Top zo!'][Math.floor(Math.random()*5)];
}
