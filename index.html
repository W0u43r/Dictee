<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a0e14; --card:#121820; --card2:#1a2230; --line:#1e2d3d; --line2:#263040;
  --accent:#00d4a0; --blue:#3b82f6; --red:#f05252; --amber:#f59e0b;
  --text:#f0f4f8; --sub:#8899aa; --dim:#4a5a6a;
  --r:12px; --r-sm:8px;
  --font:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
body{max-width:540px;margin:0 auto;padding:0 0 100px;}

/* Header */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 10px;}
.brand{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.brand span{color:var(--accent);}
.btn-refresh{background:var(--card2);border:1px solid var(--line);color:var(--accent);font-family:var(--font);font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
.btn-refresh:hover{background:var(--line);}
.btn-refresh.spinning .ri{display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Market status bar */
.mkt-bar{display:flex;gap:8px;padding:4px 16px 12px;overflow-x:auto;scrollbar-width:none;}
.mkt-bar::-webkit-scrollbar{display:none;}
.mkt-pill{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:5px 10px;white-space:nowrap;font-size:11px;font-family:var(--mono);color:var(--sub);}
.mkt-pill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot.live{background:var(--accent);box-shadow:0 0 6px var(--accent);}
.dot.closed{background:var(--dim);}
.dot.pre{background:var(--amber);}
.dot.post{background:var(--amber);}
.dot.unknown{background:var(--dim);}

/* Hero */
.hero{padding:8px 16px 16px;}
.hero-label{font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.hero-value{font-size:40px;font-weight:700;letter-spacing:-1.5px;color:var(--text);line-height:1;font-family:var(--mono);}
.hero-change{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:14px;font-weight:600;font-family:var(--mono);}
.hero-change.pos{color:var(--accent);}
.hero-change.neg{color:var(--red);}

/* Portfolio chart */
.chart-card{margin:0 16px 16px;background:var(--card);border-radius:var(--r);border:1px solid var(--line);overflow:hidden;}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;}
.chart-card-title{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1px;}
.range-row{display:flex;gap:4px;padding:8px 16px 12px;}
.rb{background:none;border:none;color:var(--sub);font-family:var(--mono);font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s;}
.rb.on{background:var(--accent);color:#000;}
.chart-wrap{padding:0 4px 4px;height:130px;}

/* Stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 16px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;}
.stat-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px;line-height:1.1;}
.stat-sub{font-size:11px;color:var(--sub);margin-top:3px;font-family:var(--mono);}
.pos{color:var(--accent);} .neg{color:var(--red);}

/* Section header */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px;}
.sec-title{font-size:16px;font-weight:700;}
.btn-add{background:var(--accent);color:#000;border:none;font-family:var(--font);font-size:13px;font-weight:700;padding:8px 16px;border-radius:var(--r-sm);cursor:pointer;transition:background .15s;}
.btn-add:hover{background:#00c090;}

/* Position cards */
.pos-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:border-color .15s;}
.pos-card:hover{border-color:var(--line2);}
.pos-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.pos-left{display:flex;align-items:center;gap:10px;min-width:0;}
.pos-badge{background:transparent;border:none;border-radius:0;padding:0;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--sub);flex-shrink:0;letter-spacing:.5px;text-transform:uppercase;}
.pos-nameblock{min-width:0;}
.pos-name{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px;margin-bottom:3px;}
.pos-shares{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:2px;}
.pos-right{text-align:right;flex-shrink:0;margin-left:8px;}
.pos-price{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);}
.pos-val{font-size:12px;color:var(--sub);font-family:var(--mono);margin-top:2px;}
.pos-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-family:var(--mono);font-size:12px;font-weight:700;white-space:nowrap;}
.pill.pos{background:rgba(0,212,160,.15);color:var(--accent);}
.pill.neg{background:rgba(240,82,82,.15);color:var(--red);}
.pill.neu{background:var(--card2);color:var(--sub);}
.pos-pills{display:flex;gap:6px;flex-wrap:nowrap;}
canvas.mini{width:80px;height:36px;display:block;}

/* Drawers */
.drawer{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);}
.drawer.open{display:flex;align-items:flex-end;}
.drawer-panel{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:540px;margin:0 auto;padding:20px 20px 40px;border-top:1px solid var(--line);}
.drawer-handle{width:40px;height:4px;background:var(--line2);border-radius:4px;margin:0 auto 20px;}
.drawer-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.drawer-hint{font-size:13px;color:var(--sub);margin-bottom:18px;line-height:1.5;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.field input{width:100%;background:var(--card2);border:1px solid var(--line2);color:var(--text);font-family:var(--mono);font-size:15px;padding:12px 14px;border-radius:var(--r-sm);outline:none;transition:border-color .15s;-webkit-appearance:none;}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--dim);}
.fields-row{display:flex;gap:10px;}
.fields-row .field{flex:1;}
.search-wrap{position:relative;}
.search-spinner{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:none;}
.search-wrap.loading .search-spinner{display:block;}
.ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card2);border:1px solid var(--line2);border-radius:var(--r-sm);z-index:200;display:none;max-height:260px;overflow-y:auto;}
.ac-drop.open{display:block;}
.ac-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;}
.ac-row:last-child{border-bottom:none;}
.ac-row:hover,.ac-row.on{background:rgba(0,212,160,.07);}
.ac-sym{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);min-width:72px;}
.ac-inf{flex:1;min-width:0;}
.ac-n{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-ex{font-size:11px;color:var(--sub);font-family:var(--mono);margin-top:2px;}
.ac-tag{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:20px;background:var(--card);color:var(--sub);border:1px solid var(--line);white-space:nowrap;}
.ac-tag.etf{color:var(--blue);border-color:rgba(59,130,246,.3);}
.ac-tag.eq{color:var(--accent);border-color:rgba(0,212,160,.3);}
.ac-empty{padding:16px;text-align:center;font-size:13px;color:var(--sub);}
.sel-info{background:rgba(0,212,160,.07);border:1px solid rgba(0,212,160,.2);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;font-family:var(--mono);color:var(--accent);margin-bottom:12px;display:none;}
.msg{font-size:13px;font-family:var(--mono);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;display:none;line-height:1.6;}
.msg.err{color:var(--red);background:rgba(240,82,82,.08);border:1px solid rgba(240,82,82,.2);}
.msg.inf{color:var(--accent);background:rgba(0,212,160,.06);border:1px solid rgba(0,212,160,.2);}
.drawer-btns{display:flex;gap:10px;margin-top:6px;}
.btn-ok{flex:1;background:var(--accent);color:#000;border:none;font-family:var(--font);font-size:15px;font-weight:700;padding:14px;border-radius:var(--r-sm);cursor:pointer;transition:background .15s;}
.btn-ok:hover{background:#00c090;}
.btn-cl{background:var(--card2);color:var(--sub);border:1px solid var(--line2);font-family:var(--font);font-size:15px;padding:14px 20px;border-radius:var(--r-sm);cursor:pointer;}

/* Detail drawer */
.detail-panel{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:540px;margin:0 auto;padding:20px 20px 40px;border-top:1px solid var(--line);max-height:90vh;overflow-y:auto;}
.det-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.det-sym{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);}
.det-name{font-size:14px;color:var(--sub);margin-top:2px;}
.btn-del{background:rgba(240,82,82,.12);color:var(--red);border:1px solid rgba(240,82,82,.2);font-family:var(--font);font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;flex-shrink:0;}
.det-range{display:flex;gap:4px;margin-bottom:12px;}
.det-chart{height:160px;margin-bottom:16px;}
.det-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.det-stat{background:var(--card2);border-radius:var(--r-sm);padding:12px;}
.det-stat-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600;}
.det-stat-val{font-size:16px;font-weight:700;font-family:var(--mono);}

/* Edit position section inside detail */
.edit-section{background:var(--card2);border-radius:var(--r);border:1px solid var(--line);padding:14px;margin-bottom:12px;}
.edit-title{font-size:13px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.edit-row{display:flex;gap:8px;align-items:flex-end;}
.edit-row .field{flex:1;margin-bottom:0;}
.edit-row .field input{font-size:14px;padding:10px 12px;}
.btn-edit-ok{background:var(--accent);color:#000;border:none;font-family:var(--font);font-size:13px;font-weight:700;padding:10px 16px;border-radius:var(--r-sm);cursor:pointer;white-space:nowrap;}
.btn-edit-ok:hover{background:#00c090;}

/* Mock button — at bottom */
.mock-bar{padding:12px 16px 4px;}
.btn-mock{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--sub);font-family:var(--font);font-size:13px;font-weight:600;padding:12px;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;}
.btn-mock:hover{border-color:var(--accent);color:var(--accent);}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px;line-height:2;}
.empty-ico{font-size:40px;display:block;margin-bottom:8px;}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--card);border-top:1px solid var(--line);padding:10px 16px;max-width:540px;margin:0 auto;}
.bottom-bar-row{display:flex;align-items:center;gap:10px;}
.demo-label{font-size:13px;color:var(--sub);flex:1;line-height:1.3;}
.demo-label strong{color:var(--text);display:block;font-size:14px;}
.demo-badge{display:none;background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3);font-size:11px;font-family:var(--mono);font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;}
.demo-active .demo-badge{display:inline-block;}
.toggle{position:relative;width:44px;height:26px;cursor:pointer;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--line2);border-radius:20px;transition:background .2s;}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;}
.toggle input:checked + .toggle-slider{background:var(--amber);}
.toggle input:checked + .toggle-slider:before{transform:translateX(18px);}
.export-btns{display:flex;gap:8px;}
.btn-exp{background:var(--card2);border:1px solid var(--line);color:var(--sub);font-family:var(--font);font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;}
.btn-exp:hover{border-color:var(--accent);color:var(--accent);}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--line2);border-radius:var(--r-sm);padding:10px 18px;font-size:13px;font-family:var(--mono);color:var(--text);opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Port<span>folio</span></div>
  <button class="btn-refresh" onclick="refreshAll()"><span class="ri">&#x21BB;</span> Verversen</button>
</div>

<!-- Market status -->
<div class="mkt-bar" id="mktBar">
  <div class="mkt-pill"><span class="dot closed"></span>Laden...</div>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-label">Totale waarde</div>
  <div class="hero-value" id="heroVal">&mdash;</div>
  <div class="hero-change" id="heroChange" style="display:none"></div>
</div>

<!-- Portfolio chart -->
<div class="chart-card">
  <div class="chart-card-header">
    <span class="chart-card-title">Portfolio waarde</span>
  </div>
  <div class="range-row">
    <button class="rb on" onclick="setPortRange('7d',this)">7D</button>
    <button class="rb" onclick="setPortRange('1mo',this)">1M</button>
    <button class="rb" onclick="setPortRange('3mo',this)">3M</button>
    <button class="rb" onclick="setPortRange('1y',this)">1J</button>
  </div>
  <div class="chart-wrap"><canvas id="portChart"></canvas></div>
</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Winst / Verlies</div>
    <div class="stat-val" id="statPnl">&mdash;</div>
    <div class="stat-sub" id="statPnlSub">&mdash;</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Vandaag</div>
    <div class="stat-val" id="statDay">&mdash;</div>
    <div class="stat-sub" id="statDaySub">&mdash;</div>
  </div>
</div>

<!-- Positions -->
<div class="sec-head">
  <span class="sec-title">Posities</span>
  <button class="btn-add" onclick="openAdd()">+ Toevoegen</button>
</div>

<div id="positionsList"></div>

<!-- Mock data button at bottom -->
<div class="mock-bar">
  <button class="btn-mock" id="btnMock" onclick="loadMockData()">Testdata laden (5 aandelen)</button>
</div>

<!-- Add drawer -->
<div class="drawer" id="addDrawer" onclick="bgClose(event,'addDrawer')">
  <div class="drawer-panel">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Aandeel toevoegen</div>
    <div class="drawer-hint">Zoek op naam of ticker &mdash; alle beurzen ondersteund</div>
    <div class="msg err" id="addErr"></div>
    <div class="msg inf" id="addInf"></div>
    <div class="field">
      <label>Zoeken *</label>
      <div class="search-wrap" id="swrap">
        <input type="text" id="inpSearch" placeholder="bijv. ASML, iShares MSCI, VWRL..." autocomplete="off">
        <div class="search-spinner"></div>
        <div class="ac-drop" id="acDrop"></div>
      </div>
    </div>
    <div class="sel-info" id="selInfo"></div>
    <div class="fields-row">
      <div class="field"><label>Aantal</label><input type="number" id="inpShares" placeholder="0" min="0" step="any"></div>
      <div class="field"><label>Aankoopprijs (&euro;/$)</label><input type="number" id="inpCost" placeholder="0.00" min="0" step="any"></div>
    </div>
    <div class="drawer-btns">
      <button class="btn-ok" onclick="addStock()">Toevoegen</button>
      <button class="btn-cl" onclick="closeAdd()">Annuleer</button>
    </div>
  </div>
</div>

<!-- Detail drawer -->
<div class="drawer" id="detDrawer" onclick="bgClose(event,'detDrawer')">
  <div class="detail-panel">
    <div class="drawer-handle"></div>
    <div class="det-header">
      <div>
        <div class="det-sym" id="detSym"></div>
        <div class="det-name" id="detName"></div>
      </div>
      <button class="btn-del" id="detDel">Verwijderen</button>
    </div>
    <div class="det-range">
      <button class="rb on" onclick="setDetRange('1mo',this)">1M</button>
      <button class="rb" onclick="setDetRange('3mo',this)">3M</button>
      <button class="rb" onclick="setDetRange('6mo',this)">6M</button>
      <button class="rb" onclick="setDetRange('1y',this)">1J</button>
      <button class="rb" onclick="setDetRange('5y',this)">5J</button>
    </div>
    <div class="det-chart"><canvas id="detChart"></canvas></div>
    <div class="det-stats" id="detStats"></div>

    <!-- Edit position -->
    <div class="edit-section">
      <div class="edit-title">Positie aanpassen</div>
      <div class="edit-row">
        <div class="field"><label>Aantal</label><input type="number" id="editShares" placeholder="0" min="0" step="any"></div>
        <div class="field"><label>Gemidd. aankoopprijs</label><input type="number" id="editCost" placeholder="0.00" min="0" step="any"></div>
        <button class="btn-edit-ok" onclick="saveEdit()">Opslaan</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Bottom bar: demo mode + export/import -->
<div class="bottom-bar" id="bottomBar">
  <div class="bottom-bar-row">
    <div class="demo-label">
      <strong>Demo-modus <span class="demo-badge" id="demoBadge">DEMO</span></strong>
      Toon nepdata aan anderen
    </div>
    <label class="toggle" title="Schakel demo-modus in">
      <input type="checkbox" id="demoToggle" onchange="toggleDemo(this.checked)">
      <span class="toggle-slider"></span>
    </label>
    <div class="export-btns">
      <button class="btn-exp" onclick="exportData()">Exporteer</button>
      <button class="btn-exp" onclick="document.getElementById('importFile').click()">Importeer</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<script>
var portfolio = JSON.parse(localStorage.getItem('pf_v5') || '[]');
var quotes = {};
var portRange = '7d';
var detRange = '1mo';
var detTicker = '';
var portChartInst = null;
var detChartInst = null;
var selTicker = '', selName = '';
var acRes = [], acIdx = -1, srchTimer = null;

// ── Markets — status comes from Yahoo Finance quote metadata ─────────────
var MARKETS = [
  {name:'AEX',   exchangeTimezoneName:'Europe/Amsterdam', suffix:['.AS']},
  {name:'XETRA', exchangeTimezoneName:'Europe/Berlin',    suffix:['.DE','.HA','.F']},
  {name:'LSE',   exchangeTimezoneName:'Europe/London',    suffix:['.L']},
  {name:'NYSE',  exchangeTimezoneName:'America/New_York', suffix:[]},
  {name:'Nasdaq',exchangeTimezoneName:'America/New_York', suffix:[]}
];

// marketStates is filled in by refreshAll() from Yahoo quote metadata
// Values: 'REGULAR' | 'PRE' | 'POST' | 'CLOSED' | null
var marketStates = {};

function getMarketStatus(mkt) {
  // Use live Yahoo state if available
  var state = marketStates[mkt.name];
  if (state === 'REGULAR') return 'live';
  if (state === 'PRE')     return 'pre';
  if (state === 'POST')    return 'post';
  if (state === 'CLOSED')  return 'closed';
  // Fallback: no data yet → show unknown
  return 'unknown';
}

// Fill marketStates from a Yahoo quote result
function updateMarketState(ticker, quoteData) {
  // quoteData is the meta object from v8/chart or result from v7/quote
  var state = quoteData.marketState || quoteData.regularMarketState || null;
  if (!state) return;
  // Map ticker to market
  MARKETS.forEach(function(m) {
    if (m.suffix.length === 0) {
      if (ticker.indexOf('.') === -1) marketStates[m.name] = state;
    } else {
      m.suffix.forEach(function(s){ if (ticker.endsWith(s)) marketStates[m.name] = state; });
    }
  });
}

function getTickerExchanges() {
  // Determine which exchanges are relevant based on held tickers
  var tickers = portfolio.map(function(p){return p.ticker;});
  var relevant = {};
  MARKETS.forEach(function(m) {
    if (m.suffix.length === 0) {
      // NYSE/Nasdaq: relevant if any ticker has no dot (US stocks)
      var hasUS = tickers.some(function(t){ return t.indexOf('.')===-1; });
      if (hasUS) relevant[m.name] = true;
    } else {
      m.suffix.forEach(function(s){
        if (tickers.some(function(t){ return t.endsWith(s); })) relevant[m.name] = true;
      });
    }
  });
  return relevant;
}

function renderMarketBar() {
  var bar = document.getElementById('mktBar');
  var relevant = getTickerExchanges();
  var toShow = portfolio.length > 0
    ? MARKETS.filter(function(m){ return relevant[m.name]; })
    : MARKETS;
  if (!toShow.length) toShow = MARKETS;
  bar.innerHTML = toShow.map(function(m) {
    var st = getMarketStatus(m);
    var label, col;
    if      (st==='live')    { label='Open';        col='var(--accent)'; }
    else if (st==='pre')     { label='Pre-market';  col='var(--amber)'; }
    else if (st==='post')    { label='Na-market';   col='var(--amber)'; }
    else if (st==='closed')  { label='Gesloten';    col='var(--dim)'; }
    else                     { label='Ophalen...';  col='var(--dim)'; }
    return '<div class="mkt-pill"><span class="dot '+st+'"></span>'+m.name+' <span style="color:'+col+'">'+label+'</span></div>';
  }).join('');
}

// ── Multi-proxy fetch ─────────────────────────────────────────────────────
var PROXIES = [
  function(u){return 'https://corsproxy.io/?'+encodeURIComponent(u);},
  function(u){return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u);},
  function(u){return 'https://api.codetabs.com/v1/proxy?quest='+u;}
];
async function fj(url) {
  for (var i=0;i<PROXIES.length;i++) {
    try {
      var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},7000);
      var r=await fetch(PROXIES[i](url),{signal:ctrl.signal}); clearTimeout(t);
      if (!r.ok) continue;
      var tx=await r.text();
      if (!tx||tx.trim()[0]==='<') continue;
      return JSON.parse(tx);
    } catch(e){}
  }
  return null;
}
function save(){localStorage.setItem('pf_v5',JSON.stringify(portfolio));}

// ── Fetch quote ───────────────────────────────────────────────────────────
async function fetchQ(ticker) {
  var eps=[
    'https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=2d',
    'https://query2.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=2d',
    'https://query1.finance.yahoo.com/v7/finance/quote?symbols='+ticker,
    'https://query2.finance.yahoo.com/v7/finance/quote?symbols='+ticker
  ];
  for (var i=0;i<eps.length;i++) {
    var d=await fj(eps[i]); if(!d) continue;
    try {
      if (d.chart&&d.chart.result&&d.chart.result[0]) {
        var m=d.chart.result[0].meta;
        if (!m.regularMarketPrice) continue;
        var prev=m.chartPreviousClose||m.previousClose||m.regularMarketPrice;
        var chg=m.regularMarketPrice-prev;
        updateMarketState(ticker, m);
        return {price:m.regularMarketPrice,prev:prev,change:chg,changePct:prev?chg/prev*100:0,currency:m.currency||'EUR'};
      }
      if (d.quoteResponse&&d.quoteResponse.result&&d.quoteResponse.result[0]) {
        var q=d.quoteResponse.result[0]; if(!q.regularMarketPrice) continue;
        var prev=q.regularMarketPreviousClose||q.regularMarketPrice;
        var chg=q.regularMarketPrice-prev;
        updateMarketState(ticker, q);
        return {price:q.regularMarketPrice,prev:prev,change:chg,changePct:prev?chg/prev*100:0,currency:q.currency||'EUR'};
      }
    } catch(e){}
  }
  return null;
}

// ── Fetch history ─────────────────────────────────────────────────────────
async function fetchHist(ticker,range) {
  // Use weekly intervals for longer ranges to get more readable candles
  var interval = (range==='1y'||range==='5y') ? '1wk' : '1d';
  var d=await fj('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval='+interval+'&range='+range);
  if (!d) return [];
  try {
    var res=d.chart.result[0],ts=res.timestamp,q=res.indicators.quote[0];
    return ts.map(function(t,i){
      var o=q.open[i],h=q.high[i],l=q.low[i],cl=q.close[i];
      if (!cl) return null;
      return {t:t, v:+cl.toFixed(2), o:o?+o.toFixed(2):null, h:h?+h.toFixed(2):null, l:l?+l.toFixed(2):null};
    }).filter(function(p){return p!==null;});
  } catch(e){return [];}
}

// ── Mini sparkline ────────────────────────────────────────────────────────
async function drawMini(canvas,ticker,color) {
  var d=await fj('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=1mo');
  if (!d) return;
  try {
    var cl=d.chart.result[0].indicators.quote[0].close.filter(function(c){return c!==null;}).map(function(c){return +c.toFixed(2);});
    if (!cl.length) return;
    var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
    var mn=Math.min.apply(null,cl),mx=Math.max.apply(null,cl),rng=mx-mn||1;
    ctx.clearRect(0,0,w,h); ctx.beginPath();
    cl.forEach(function(v,i){var x=(i/(cl.length-1))*w,y=h-((v-mn)/rng)*(h-4)-2;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();
    ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
    var g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,color+'33'); g.addColorStop(1,color+'00');
    ctx.fillStyle=g; ctx.fill();
  } catch(e){}
}

// ── Format ────────────────────────────────────────────────────────────────
function fmtN(n,d){if(n==null||isNaN(n))return '\u2014';d=d!==undefined?d:2;return n.toLocaleString('nl-NL',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtC(n,cur){if(n==null||isNaN(n))return '\u2014';var s=cur==='USD'?'$':cur==='GBP'?'\u00a3':'\u20ac';return s+fmtN(Math.abs(n));}
// FIX #5: always show sign for P&L values
function fmtPnl(n,cur){if(n==null||isNaN(n))return '\u2014';var s=cur==='USD'?'$':cur==='GBP'?'\u00a3':'\u20ac';return (n>=0?'+':'\u2212')+s+fmtN(Math.abs(n));}
function pctStr(n){if(n==null)return '\u2014';return (n>=0?'+':'')+fmtN(n)+'%';}

function renderHero() {
  var total=0,totalCost=0,dayAbs=0,hasVal=false;
  portfolio.forEach(function(pos){
    var q=quotes[pos.ticker]; if(!q||!pos.shares) return;
    total+=q.price*pos.shares; dayAbs+=q.change*pos.shares; hasVal=true;
    if (pos.costBasis) totalCost+=pos.shares*pos.costBasis;
  });
  if (!hasVal){document.getElementById('heroVal').textContent='\u2014';return;}
  document.getElementById('heroVal').textContent='\u20ac'+fmtN(total);
  var hc=document.getElementById('heroChange');
  hc.style.display='flex'; hc.className='hero-change '+(dayAbs>=0?'pos':'neg');
  // FIX #5: show minus sign explicitly
  hc.textContent=(dayAbs>=0?'+':'\u2212')+'\u20ac'+fmtN(Math.abs(dayAbs))+' vandaag';

  var sp=document.getElementById('statPnl'),ss=document.getElementById('statPnlSub');
  var sd=document.getElementById('statDay'),sds=document.getElementById('statDaySub');
  if (totalCost>0) {
    var pnl=total-totalCost, pnlPct=pnl/totalCost*100;
    // FIX #5: correct sign + color
    sp.className='stat-val '+(pnl>=0?'pos':'neg');
    sp.textContent=fmtPnl(pnl,'EUR');
    ss.textContent=pctStr(pnlPct);
  } else {sp.textContent='\u2014';ss.textContent='Geen aankoopprijs';}
  sd.className='stat-val '+(dayAbs>=0?'pos':'neg');
  sd.textContent=(dayAbs>=0?'+':'\u2212')+'\u20ac'+fmtN(Math.abs(dayAbs));
  var dp=portfolio.filter(function(p){return quotes[p.ticker];});
  var avgPct=dp.length?dp.reduce(function(s,p){return s+quotes[p.ticker].changePct;},0)/dp.length:0;
  sds.textContent=pctStr(avgPct)+' gem.';

// ── Portfolio total chart ─────────────────────────────────────────────────
async function renderPortChart() {
  if (!portfolio.length) return;
  var rangeMap={'7d':'5d','1mo':'1mo','3mo':'3mo','1y':'1y'};
  var range=rangeMap[portRange]||'1mo';
  var holdings=portfolio.filter(function(p){return p.shares>0;});
  if (!holdings.length) return;
  var allHist=await Promise.all(holdings.map(async function(pos){
    return {pos:pos,hist:await fetchHist(pos.ticker,range)};
  }));
  var tsSet={};
  allHist.forEach(function(item){item.hist.forEach(function(p){tsSet[p.t]=true;});});
  var timestamps=Object.keys(tsSet).map(Number).sort(function(a,b){return a-b;});
  if (!timestamps.length) return;
  var vals=[];
  timestamps.forEach(function(ts){
    var total=0,valid=true;
    allHist.forEach(function(item){
      if (!item.pos.shares){return;}
      var best=null,bestD=Infinity;
      item.hist.forEach(function(p){var d=Math.abs(p.t-ts);if(d<bestD){bestD=d;best=p;}});
      if (best&&bestD<86400*3) total+=best.v*item.pos.shares;
      else valid=false;
    });
    if (valid||holdings.length===1) vals.push(total);
  });
  var lbls=timestamps.slice(timestamps.length-vals.length).map(function(ts){
    var d=new Date(ts*1000);
    return portRange==='7d'?d.toLocaleDateString('nl-NL',{weekday:'short'}):d.toLocaleDateString('nl-NL',{month:'short',day:'numeric'});
  });
  var isPos=vals.length>1&&vals[vals.length-1]>=vals[0];
  var col=isPos?'#00d4a0':'#f05252';
  var ctx=document.getElementById('portChart').getContext('2d');
  if (portChartInst) portChartInst.destroy();
  portChartInst=new Chart(ctx,{type:'line',
    data:{labels:lbls,datasets:[{data:vals,borderColor:col,
      backgroundColor:function(c){var g=c.chart.ctx.createLinearGradient(0,0,0,130);g.addColorStop(0,col+'44');g.addColorStop(1,col+'00');return g;},
      borderWidth:2,pointRadius:0,tension:.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' \u20ac'+fmtN(c.parsed.y);}},
        backgroundColor:'#121820',borderColor:'#1e2d3d',borderWidth:1,bodyColor:'#f0f4f8',bodyFont:{family:'JetBrains Mono',size:11}}},
      scales:{x:{grid:{color:'#1e2d3d'},ticks:{color:'#8899aa',font:{family:'JetBrains Mono',size:9},maxTicksLimit:portRange==='7d'?7:6}},
              y:{grid:{color:'#1e2d3d'},ticks:{color:'#8899aa',font:{family:'JetBrains Mono',size:9},callback:function(v){return '\u20ac'+fmtN(v,0);}}}}}
  });
}

    data:{labels:lbls,datasets:[{data:vals,borderColor:col,
      backgroundColor:function(ch){var g=ch.chart.ctx.createLinearGradient(0,0,0,160);g.addColorStop(0,col+'44');g.addColorStop(1,col+'00');return g;},
      borderWidth:2,pointRadius:0,tension:.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(item){return ' '+fmtN(item.parsed.y);}},
        backgroundColor:'#121820',borderColor:'#1e2d3d',borderWidth:1,
        bodyColor:'#f0f4f8',bodyFont:{family:'JetBrains Mono',size:11}}},
      scales:{
        x:{grid:{color:'#1e2d3d'},ticks:{color:'#8899aa',font:{family:'JetBrains Mono',size:9},maxTicksLimit:8}},
        y:{grid:{color:'#1e2d3d'},ticks:{color:'#8899aa',font:{family:'JetBrains Mono',size:9}}}
      }
    }
  });
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

// ── Keyboard ──────────────────────────────────────────────────────────────
document.getElementById('inpSearch').addEventListener('input',onSearch);
document.addEventListener('keydown',function(e){
  var drop=document.getElementById('acDrop'),items=drop.querySelectorAll('.ac-row'),open=drop.classList.contains('open');
  if (open&&items.length){
    if (e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('on',i===acIdx);});return;}
    if (e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);items.forEach(function(el,i){el.classList.toggle('on',i===acIdx);});return;}
    if (e.key==='Enter'&&acIdx>=0){e.preventDefault();e.stopPropagation();pickAC(acIdx);return;}
  }
  if (e.key==='Enter'&&document.getElementById('addDrawer').classList.contains('open')&&!open){addStock();return;}
  if (e.key==='Escape'){document.getElementById('addDrawer').classList.remove('open');document.getElementById('detDrawer').classList.remove('open');}
});
document.addEventListener('click',function(e){if(!e.target.closest('#swrap'))document.getElementById('acDrop').classList.remove('open');});

var demoOn = false;

function toggleDemo(on) {
  demoOn = on;
  document.getElementById('bottomBar').classList.toggle('demo-active', on);
  document.getElementById('demoBadge').style.display = on ? 'inline-block' : 'none';
  if (on) {

// ── Export / Import ──────────────────────────────────────────────────────────────────────────
function exportData() {
  var data = JSON.stringify(portfolio, null, 2);
  var blob = new Blob([data], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'portfolio-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Portfolio geexporteerd');
}

function importData(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error('Geen geldige array');
      // Validate basic structure
      data.forEach(function(p) { if (!p.ticker) throw new Error('Missende ticker'); });
      portfolio = data;
      save();
      render();
      refreshAll();
      showToast(data.length + ' posities geladen');
    } catch(err) {
      showToast('Import mislukt: ' + err.message);
    }
    e.target.value = ''; // reset so same file can be reimported
  };
  reader.readAsText(file);
}
